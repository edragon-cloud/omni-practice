<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fluentalk — Speaking Reports</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,600;0,700;1,600&family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  --ink:    #0E0E0C;
  --paper:  #F8F7F4;
  --cream:  #EDEAE2;
  --red:    #C8102E;
  --red-l:  #FDE8EC;
  --green:  #1A7A4A;
  --grn-l:  #E6F4ED;
  --gold:   #B45309;
  --gld-l:  #FEF3C7;
  --blue:   #1D4ED8;
  --blue-l: #EFF6FF;
  --purple: #6D28D9;
  --pur-l:  #F5F3FF;
  --grey:   #77776E;
  --border: #DDD9CF;
  --shadow: 0 2px 16px rgba(14,14,12,.07);
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{font-family:'DM Sans',sans-serif;background:var(--paper);color:var(--ink);min-height:100vh;font-size:15px;line-height:1.65;-webkit-font-smoothing:antialiased}

/* ── TOPBAR ── */
.topbar{background:var(--ink);height:52px;display:flex;align-items:center;justify-content:space-between;padding:0 28px;position:sticky;top:0;z-index:100}
.brand{font-family:'Playfair Display',serif;font-size:1.1rem;color:#fff}
.brand em{color:var(--red);font-style:normal}
.topbar-right{display:flex;gap:8px}
.btn{display:inline-flex;align-items:center;gap:6px;padding:7px 16px;border:none;border-radius:8px;font-family:'DM Sans',sans-serif;font-size:13px;font-weight:600;cursor:pointer;transition:all .18s;text-decoration:none;white-space:nowrap}
.btn-ghost{background:rgba(255,255,255,.1);color:rgba(255,255,255,.75)}.btn-ghost:hover{background:rgba(255,255,255,.18);color:#fff}
.btn-red{background:var(--red);color:#fff}.btn-red:hover{background:#a50d24}
.btn-outline{background:transparent;border:1.5px solid var(--border);color:var(--ink)}.btn-outline:hover{border-color:var(--red);color:var(--red)}
.btn-sm{padding:5px 12px;font-size:12px}

/* ── LAYOUT ── */
.page-wrap{max-width:860px;margin:0 auto;padding:32px 24px 80px}

/* ── HEADER CARD ── */
.header-card{background:var(--ink);border-radius:16px;overflow:hidden;margin-bottom:20px}
.header-top{padding:28px 32px;display:grid;grid-template-columns:1fr auto;gap:24px;align-items:center}
.header-label{font-size:10px;letter-spacing:.14em;text-transform:uppercase;color:rgba(255,255,255,.35);margin-bottom:4px}
.header-name{font-family:'Playfair Display',serif;font-size:1.7rem;color:#fff;margin-bottom:10px}
.header-meta{display:flex;gap:16px;flex-wrap:wrap}
.meta-item{font-size:12px;color:rgba(255,255,255,.45)}
.meta-item strong{color:rgba(255,255,255,.85)}
.band-box{text-align:center;background:rgba(255,255,255,.06);border:1.5px solid rgba(255,255,255,.12);border-radius:12px;padding:18px 28px}
.band-num{font-family:'Playfair Display',serif;font-size:3.2rem;line-height:1;margin-bottom:4px}
.band-lbl{font-size:9px;letter-spacing:.15em;text-transform:uppercase;color:rgba(255,255,255,.3)}

/* ── SCORES ROW ── */
.scores-row{display:grid;grid-template-columns:repeat(4,1fr);border-top:1.5px solid rgba(255,255,255,.08)}
.score-cell{padding:16px 20px;border-right:1px solid rgba(255,255,255,.06)}
.score-cell:last-child{border-right:none}
.score-key{font-size:9px;letter-spacing:.12em;text-transform:uppercase;color:rgba(255,255,255,.3);margin-bottom:6px}
.score-val{font-family:'Playfair Display',serif;font-size:1.8rem;margin-bottom:6px}
.score-bar{height:3px;background:rgba(255,255,255,.1);border-radius:2px;overflow:hidden}
.score-fill{height:100%;border-radius:2px;transition:width .6s ease}

/* ── SECTIONS ── */
.section{background:#fff;border:1.5px solid var(--border);border-radius:14px;overflow:hidden;margin-bottom:16px;box-shadow:var(--shadow)}
.section-head{display:flex;align-items:center;gap:10px;padding:14px 20px;border-bottom:1.5px solid var(--border);background:var(--paper)}
.section-icon{font-size:16px}
.section-title{font-family:'Playfair Display',serif;font-size:.92rem;color:var(--ink)}
.section-count{margin-left:auto;font-size:11px;font-weight:600;color:var(--grey);background:var(--cream);padding:2px 9px;border-radius:100px}
.section-body{padding:20px}

/* ── Q-A CARDS (speaking specific) ── */
.qa-card{border:1px solid var(--border);border-radius:12px;margin-bottom:14px;overflow:hidden}
.qa-card:last-child{margin-bottom:0}
.qa-card-hdr{display:flex;align-items:center;gap:10px;padding:14px 18px;background:var(--paper);cursor:pointer;transition:.15s}
.qa-card-hdr:hover{background:var(--cream)}
.qa-num-badge{width:28px;height:28px;border-radius:50%;background:var(--red);color:#fff;font-size:11px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.qa-q-text{flex:1;font-weight:600;font-size:.88rem;color:var(--ink);line-height:1.5}
.qa-band-pill{background:var(--ink);color:#FCD34D;font-family:'DM Mono',monospace;font-size:11px;font-weight:700;padding:2px 11px;border-radius:99px;flex-shrink:0}
.qa-chevron{color:var(--grey);font-size:11px;flex-shrink:0;transition:transform .2s}
.qa-chevron.open{transform:rotate(180deg)}
.qa-card-body{display:none;padding:16px 18px;border-top:1px solid var(--border)}
.qa-card-body.open{display:block}
.qa-lbl{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:var(--grey);margin-bottom:6px;margin-top:14px}
.qa-lbl:first-child{margin-top:0}
.qa-answer{background:var(--paper);border-radius:8px;padding:12px 14px;font-size:.87rem;line-height:1.75;font-style:italic;color:#444;border-left:3px solid var(--border)}
.qa-corr{background:var(--grn-l);border-left:3px solid var(--green);border-radius:0 8px 8px 0;padding:12px 14px;font-size:.87rem;line-height:1.75}
.qa-sugg{background:var(--blue-l);border-left:3px solid var(--blue);border-radius:0 8px 8px 0;padding:12px 14px;font-size:.87rem;line-height:1.75}
.qa-scores{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-top:12px}
.qa-score-cell{background:var(--paper);border-radius:8px;padding:10px;text-align:center;border:1px solid var(--border)}
.qa-score-val{font-family:'Playfair Display',serif;font-size:1.4rem;font-weight:700}
.qa-score-key{font-size:9px;letter-spacing:.1em;text-transform:uppercase;color:var(--grey);margin-top:2px}

/* ── REPORT BOX ── */
.rpt-box{font-size:.88rem;line-height:1.85;color:#333;background:var(--grn-l);border-left:3px solid var(--green);border-radius:0 8px 8px 0;padding:14px 18px}
.rpt-box h3{font-size:.82rem;font-weight:700;color:var(--ink);margin:14px 0 7px;border-bottom:1px solid rgba(0,0,0,.07);padding-bottom:3px}
.rpt-box h3:first-child{margin-top:0}
.rpt-box table{width:100%;border-collapse:collapse;margin:8px 0;font-size:.8rem}
.rpt-box th{background:rgba(0,0,0,.07);padding:7px 10px;text-align:left;font-weight:600}
.rpt-box td{padding:7px 10px;border-bottom:1px solid rgba(0,0,0,.07);vertical-align:top}
.rpt-box ul{padding-left:16px;margin:5px 0}.rpt-box li{margin-bottom:3px}
.rpt-box strong{color:var(--ink)}.rpt-box blockquote{border-left:3px solid var(--green);padding:5px 10px;margin:6px 0;background:rgba(255,255,255,.5);border-radius:0 6px 6px 0;font-style:italic}
.rpt-box hr{border:none;border-top:1px solid rgba(0,0,0,.1);margin:12px 0}

/* ── MODE BADGES ── */
.mode-badge{display:inline-block;font-size:.72rem;font-weight:700;padding:3px 10px;border-radius:6px;text-transform:uppercase;letter-spacing:.04em}
.mb-p1{background:var(--blue-l);color:var(--blue)}
.mb-p2{background:var(--grn-l);color:var(--green)}
.mb-p3{background:var(--gld-l);color:var(--gold)}
.mb-sim{background:var(--red-l);color:var(--red)}
.mb-cefr{background:var(--pur-l);color:var(--purple)}

/* ── HISTORY TABLE ── */
.table-wrap{overflow-x:auto;border-radius:10px;border:1.5px solid var(--border)}
table{width:100%;border-collapse:collapse;font-size:13px}
thead{background:var(--ink)}
th{padding:10px 14px;text-align:left;font-size:10px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:rgba(255,255,255,.5);white-space:nowrap}
td{padding:10px 14px;border-top:1px solid var(--border);vertical-align:middle}
tr:hover td{background:var(--paper);cursor:pointer}
.band-pill{display:inline-block;font-weight:700;font-size:.75rem;padding:2px 10px;border-radius:100px}
.band-7{background:var(--grn-l);color:var(--green)}
.band-6{background:var(--gld-l);color:var(--gold)}
.band-5{background:var(--red-l);color:var(--red)}

/* ── STATS SUMMARY ── */
.stats-row{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:24px}
.stat-card{background:#fff;border:1.5px solid var(--border);border-radius:12px;padding:16px;text-align:center;box-shadow:var(--shadow)}
.stat-val{font-family:'Playfair Display',serif;font-size:2rem;font-weight:700;color:var(--ink)}
.stat-lbl{font-size:11px;color:var(--grey);text-transform:uppercase;letter-spacing:.07em;margin-top:4px}

/* ── FILTER CHIPS ── */
.filter-row{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:20px}
.fchip{padding:6px 16px;border-radius:99px;font-size:12px;font-weight:600;border:1.5px solid var(--border);color:var(--grey);background:transparent;cursor:pointer;transition:.15s;font-family:'DM Sans',sans-serif}
.fchip:hover{border-color:var(--red);color:var(--ink)}.fchip.sel{background:var(--ink);border-color:var(--ink);color:#fff}

/* ── TABS ── */
.tabs{display:flex;gap:4px;background:var(--cream);border-radius:10px;padding:4px;margin-bottom:24px}
.tab{flex:1;text-align:center;padding:9px;border:none;border-radius:7px;font-family:'DM Sans',sans-serif;font-size:13px;font-weight:600;cursor:pointer;background:transparent;color:var(--grey);transition:all .18s}
.tab.active{background:#fff;color:var(--ink);box-shadow:0 1px 6px rgba(0,0,0,.1)}

/* ── EMPTY / LOADING ── */
.empty-state{text-align:center;padding:64px 32px;color:var(--grey)}
.empty-icon{font-size:2.5rem;margin-bottom:12px}
.empty-title{font-family:'Playfair Display',serif;font-size:1.1rem;color:var(--ink);margin-bottom:8px}
.empty-state p{font-size:.85rem;max-width:320px;margin:0 auto;line-height:1.7}
.spinner{width:36px;height:36px;border:2px solid var(--border);border-top-color:var(--red);border-radius:50%;animation:spin .7s linear infinite;margin:0 auto 14px}
@keyframes spin{to{transform:rotate(360deg)}}

/* ── REPORT VIEW ── */
#report-view{display:none}
#report-view.active{display:block}
#list-view.hidden{display:none}

@media(max-width:600px){
  .header-top{grid-template-columns:1fr}
  .scores-row,.stats-row{grid-template-columns:repeat(2,1fr)}
  .band-box{width:fit-content}
  .page-wrap{padding:16px 14px 60px}
  .qa-scores{grid-template-columns:repeat(2,1fr)}
}
@media print{
  .topbar,.tabs,.btn,.btn-red,.btn-ghost,.btn-outline,.filter-row{display:none!important}
  .page-wrap{padding:0;max-width:100%}
  .section{break-inside:avoid;box-shadow:none;border:1px solid #ccc}
  body{font-size:12px}
}
</style>
</head>
<body>

<div class="topbar">
  <div class="brand">Fluen<em>talk</em> <span style="font-family:'DM Sans',sans-serif;font-size:.7rem;color:rgba(255,255,255,.3);font-weight:400;margin-left:6px;letter-spacing:.08em;text-transform:uppercase">Speaking Reports</span></div>
  <div class="topbar-right">
    <button class="btn btn-ghost" onclick="goBack()" id="btn-back" style="display:none">← All Results</button>
    <button class="btn btn-ghost" onclick="window.print()" id="btn-print" style="display:none">🖨 Print</button>
    <button class="btn btn-ghost" onclick="location.href='speak.html'">🎙 Luyện tập</button>
  </div>
</div>

<div class="page-wrap">

  <!-- TABS -->
  <div class="tabs" id="tabs-bar">
    <button class="tab active" onclick="switchTab('latest')">⚡ Latest Session</button>
    <button class="tab" onclick="switchTab('history')">📋 My History</button>
  </div>

  <!-- LIST VIEW -->
  <div id="list-view">
    <div id="tab-latest">
      <div id="latest-content">
        <div class="empty-state"><div class="spinner"></div><div>Đang tải kết quả…</div></div>
      </div>
    </div>
    <div id="tab-history" style="display:none">
      <div id="history-content">
        <div class="empty-state"><div class="spinner"></div><div>Đang tải lịch sử…</div></div>
      </div>
    </div>
  </div>

  <!-- FULL REPORT VIEW -->
  <div id="report-view"></div>

</div>

<script>
'use strict';
const GAS = 'https://script.google.com/macros/s/AKfycby6tUJxFfZ0hDe2EVD-e1uTDVEv-42ivsJyOzqMWI5LFaZnXsxgQcvYbZ9W2ADbObk-NQ/exec';
const S = { user: null, sessionToken: '', rows: [], filtered: [], currentEntry: null, activeFilter: 'all', activeTab: 'latest' };

// ── HELPERS ────────────────────────────────────────────────────
function esc(s){ return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function fmtDate(s){
  try{ const d=new Date(s); if(isNaN(d)) return s||'—'; return d.toLocaleString('vi-VN',{day:'2-digit',month:'2-digit',year:'numeric',hour:'2-digit',minute:'2-digit',hour12:false}); }
  catch(e){ return s||'—'; }
}
function fmtDur(mins){
  if(!mins||isNaN(mins)) return '—';
  const m=parseInt(mins);
  return m>=60?`${Math.floor(m/60)}h${String(m%60).padStart(2,'0')}m`:`${m} min`;
}
function bandColor(v){ const n=parseFloat(v); if(!n) return 'var(--grey)'; return n>=7?'var(--green)':n>=5.5?'var(--gold)':'var(--red)'; }
function bandClass(v){ const n=parseFloat(v); if(!n) return ''; return n>=7?'band-7':n>=5.5?'band-6':'band-5'; }
function scoreBar(v){ const pct=parseFloat(v)>0?(parseFloat(v)/9*100)+'%':'0%'; return `<div class="score-bar"><div class="score-fill" style="width:${pct};background:${bandColor(v)}"></div></div>`; }
function safeJSON(s, fb=[]){ try{ return JSON.parse(s)||fb; }catch(_){ return fb; } }

function getModeInfo(simMode){
  const m=String(simMode||'').toLowerCase();
  if(m.includes('simulation')) return {label:'SIMULATION',cls:'mb-sim',part:'sim'};
  if(m.includes('p1')) return {label:'PART 1',cls:'mb-p1',part:'p1'};
  if(m.includes('p2')) return {label:'PART 2',cls:'mb-p2',part:'p2'};
  if(m.includes('p3')) return {label:'PART 3',cls:'mb-p3',part:'p3'};
  if(m.includes('cefr')) return {label:'CEFR',cls:'mb-cefr',part:'cefr'};
  return {label:simMode||'IELTS',cls:'mb-p1',part:'ielts'};
}

function avgBand(results){
  const bands=results.map(r=>parseFloat(r.overall||0)).filter(b=>b>0);
  return bands.length?Math.round(bands.reduce((a,b)=>a+b,0)/bands.length*2)/2:0;
}
function avgCriteria(results, key){
  const sc=results.map(r=>(r.scores&&r.scores[key]?.score)||0).filter(s=>s>0);
  return sc.length?Math.round(sc.reduce((a,b)=>a+b,0)/sc.length*2)/2:0;
}

// ── INIT ───────────────────────────────────────────────────────
window.onload = async () => {
  const tok = sessionStorage.getItem('ielts_hub_token');
  const usr = sessionStorage.getItem('ielts_hub_user');
  if(!tok||!usr){ location.href='index.html'; return; }
  S.user = JSON.parse(usr); S.sessionToken = tok;
  await loadHistory();
};

async function loadHistory(){
  try{
    const resp = await fetch(GAS,{
      method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({action:'teacher.getAllResults', sessionToken:S.sessionToken, payload:{}})
    });
    const j = await resp.json();
    let rows = [];
    if(j.success && j.speakSubs){
      const sid = String(S.user.studentId||'').trim();
      const name = String(S.user.fullName||'').trim().toLowerCase();
      rows = j.speakSubs.filter(r=>
        (sid && String(r.AccessCode||'').trim()===sid) ||
        (name && String(r.StudentName||'').trim().toLowerCase()===name)
      );
    }
    S.rows = rows.reverse(); // newest first
    renderLatest();
    renderHistory();
  }catch(e){
    document.getElementById('latest-content').innerHTML=`<div class="empty-state"><div class="empty-icon">⚠️</div><div class="empty-title">Lỗi tải dữ liệu</div><p>${esc(e.message)}</p></div>`;
  }
}

// ── TAB SWITCHING ──────────────────────────────────────────────
function switchTab(tab){
  S.activeTab=tab;
  document.querySelectorAll('.tab').forEach((t,i)=>t.classList.toggle('active',['latest','history'][i]===tab));
  document.getElementById('tab-latest').style.display=tab==='latest'?'block':'none';
  document.getElementById('tab-history').style.display=tab==='history'?'block':'none';
  document.getElementById('btn-back').style.display='none';
  document.getElementById('btn-print').style.display='none';
  document.getElementById('report-view').className='';
  document.getElementById('list-view').className='';
}

// ── LATEST TAB ─────────────────────────────────────────────────
function renderLatest(){
  const el = document.getElementById('latest-content');
  if(!S.rows.length){
    el.innerHTML=`<div class="empty-state"><div class="empty-icon">🎙</div><div class="empty-title">Chưa có session nào</div><p>Luyện nói trong Fluentalk để xem kết quả tại đây.</p><br><a href="speak.html" class="btn btn-red">🎙 Luyện tập ngay</a></div>`;
    return;
  }
  const entry = parseRow(S.rows[0]);
  el.innerHTML = buildMiniCard(entry);
}

// ── HISTORY TAB ────────────────────────────────────────────────
function renderHistory(){
  const el = document.getElementById('history-content');
  if(!S.rows.length){
    el.innerHTML=`<div class="empty-state"><div class="empty-icon">⏳</div><div class="empty-title">Chưa có lịch sử</div><p>Hoàn thành một session luyện tập để thấy lịch sử ở đây.</p></div>`;
    return;
  }
  // Stats
  const allParsed = S.rows.map(parseRow);
  const allBands = allParsed.map(e=>parseFloat(e.overall)).filter(b=>b>0);
  const best = allBands.length?Math.max(...allBands).toFixed(1):'—';
  const avg = allBands.length?(allBands.reduce((a,b)=>a+b,0)/allBands.length).toFixed(1):'—';
  const totalMins = allParsed.reduce((s,e)=>s+parseInt(e.duration||0),0);

  const statsHTML = `
  <div class="stats-row">
    <div class="stat-card"><div class="stat-val">${S.rows.length}</div><div class="stat-lbl">Sessions</div></div>
    <div class="stat-card"><div class="stat-val" style="color:${bandColor(best)}">${best}</div><div class="stat-lbl">Best Band</div></div>
    <div class="stat-card"><div class="stat-val" style="color:${bandColor(avg)}">${avg}</div><div class="stat-lbl">Avg Band</div></div>
    <div class="stat-card"><div class="stat-val">${totalMins}</div><div class="stat-lbl">Total Mins</div></div>
  </div>`;

  const filterHTML = `
  <div class="filter-row">
    ${['all','p1','p2','p3','sim','cefr'].map(f=>`
      <button class="fchip${S.activeFilter===f?' sel':''}" onclick="setFilter('${f}',this)">${{all:'All',p1:'Part 1',p2:'Part 2',p3:'Part 3',sim:'Simulation',cefr:'CEFR'}[f]}</button>
    `).join('')}
  </div>`;

  S.filtered = S.activeFilter==='all' ? allParsed : allParsed.filter(e=>getModeInfo(e.simMode).part===S.activeFilter);

  const countLabel = `<div style="font-size:12px;color:var(--grey);margin-bottom:12px;font-weight:600">${S.filtered.length} session${S.filtered.length!==1?'s':''}</div>`;

  const tableHTML = S.filtered.length===0 ? `<div class="empty-state"><div class="empty-icon">🔍</div><p>Không có session nào cho filter này.</p></div>` : `
  <div class="table-wrap">
    <table>
      <thead><tr>
        <th>#</th><th>Mode</th><th>Ngày giờ</th><th>Thời lượng</th><th>Câu hỏi</th><th>FC</th><th>LR</th><th>GR</th><th>PR</th><th>Band</th>
      </tr></thead>
      <tbody>
        ${S.filtered.map((e,i)=>`
          <tr onclick="openReport(${S.rows.indexOf(e._raw)})" title="Xem báo cáo chi tiết">
            <td style="color:var(--grey);font-size:.8rem">${i+1}</td>
            <td><span class="mode-badge ${getModeInfo(e.simMode).cls}">${getModeInfo(e.simMode).label}</span>${e.hints?` <span style="font-size:10px;color:var(--gold);font-weight:600">💡</span>`:''}</td>
            <td style="font-size:.82rem;color:var(--grey)">${fmtDate(e.startTime)}</td>
            <td style="font-family:'DM Mono',monospace;font-size:.82rem">${fmtDur(e.duration)}</td>
            <td style="font-size:.82rem;color:var(--grey)">${e.qCount} câu</td>
            <td><span style="font-weight:700;color:${bandColor(e.scores.fluency)};font-family:'DM Mono',monospace">${e.scores.fluency||'—'}</span></td>
            <td><span style="font-weight:700;color:${bandColor(e.scores.lexical)};font-family:'DM Mono',monospace">${e.scores.lexical||'—'}</span></td>
            <td><span style="font-weight:700;color:${bandColor(e.scores.grammar)};font-family:'DM Mono',monospace">${e.scores.grammar||'—'}</span></td>
            <td><span style="font-weight:700;color:${bandColor(e.scores.pronunciation)};font-family:'DM Mono',monospace">${e.scores.pronunciation||'—'}</span></td>
            <td><span class="band-pill ${bandClass(e.overall)}">${e.overall||'—'}</span></td>
          </tr>
        `).join('')}
      </tbody>
    </table>
  </div>`;

  el.innerHTML = statsHTML + filterHTML + countLabel + tableHTML;
}

function setFilter(f, btn){
  S.activeFilter=f;
  document.querySelectorAll('.fchip').forEach(c=>c.classList.remove('sel'));
  if(btn) btn.classList.add('sel');
  renderHistory();
}

// ── PARSE ROW ──────────────────────────────────────────────────
function parseRow(raw){
  const results  = safeJSON(raw.ResultsJSON, []);
  const questions= safeJSON(raw.QuestionsJSON, []);
  const simMode  = raw.SimMode||'';
  const hints    = simMode.includes('hints')&&!simMode.includes('nohints');

  // Compute avg scores across Q results
  const fluency     = avgCriteria(results,'fluency');
  const lexical     = avgCriteria(results,'lexical')||avgCriteria(results,'vocabulary');
  const grammar     = avgCriteria(results,'grammar');
  const pronun      = avgCriteria(results,'pronunciation');
  const overall     = avgBand(results)||parseFloat(raw.Overall||0);

  return {
    _raw: raw,
    name: raw.StudentName||S.user?.fullName||'Student',
    studentId: raw.AccessCode||S.user?.studentId||'',
    class: raw.Class||S.user?.class||'',
    simMode, hints,
    startTime: raw.StartingTime||'',
    endTime: raw.SubmittingTime||'',
    duration: raw.DurationMin||0,
    qCount: questions.length||results.length,
    questions, results,
    overall: overall||'—',
    scores: { fluency:fluency||'', lexical:lexical||'', grammar:grammar||'', pronunciation:pronun||'' },
  };
}

// ── MINI CARD (latest tab) ─────────────────────────────────────
function buildMiniCard(e){
  const mi = getModeInfo(e.simMode);
  const scores = e.scores;
  return `
  <div class="section" style="margin-bottom:16px">
    <div style="background:var(--ink);padding:22px 26px;display:grid;grid-template-columns:1fr auto;gap:20px;align-items:center;border-radius:12px 12px 0 0">
      <div>
        <div style="font-size:.65rem;letter-spacing:.12em;text-transform:uppercase;color:rgba(255,255,255,.35);margin-bottom:4px">Latest Session</div>
        <div style="font-family:'Playfair Display',serif;font-size:1.4rem;color:#fff;margin-bottom:8px">${esc(e.name)}</div>
        <div style="display:flex;gap:12px;flex-wrap:wrap;margin-bottom:6px">
          <span class="mode-badge ${mi.cls}">${mi.label}</span>
          ${e.hints?'<span style="font-size:11px;font-weight:600;color:#FCD34D">💡 With Hints</span>':''}
        </div>
        <div style="display:flex;gap:12px;flex-wrap:wrap">
          ${e.startTime?`<span style="font-size:.75rem;color:rgba(255,255,255,.5)">▶ <strong style="color:rgba(255,255,255,.85)">${fmtDate(e.startTime)}</strong></span>`:''}
          <span style="font-size:.75rem;color:rgba(255,255,255,.5)">⏱ <strong style="color:rgba(255,255,255,.85)">${fmtDur(e.duration)}</strong></span>
          <span style="font-size:.75rem;color:rgba(255,255,255,.5)">🎙 <strong style="color:rgba(255,255,255,.85)">${e.qCount} câu</strong></span>
        </div>
      </div>
      <div class="band-box">
        <div class="band-num" style="color:${bandColor(e.overall)}">${e.overall}</div>
        <div class="band-lbl">${mi.part==='cefr'?'CEFR Level':'Overall Band'}</div>
      </div>
    </div>
    <div style="display:grid;grid-template-columns:repeat(4,1fr);border-top:1px solid rgba(255,255,255,.08);background:var(--ink)">
      ${[['FC','Fluency',scores.fluency],['LR','Lexical',scores.lexical],['GR','Grammar',scores.grammar],['PR','Pronunciation',scores.pronunciation]].map(([k,l,v],i)=>`
        <div style="padding:14px 18px;${i<3?'border-right:1px solid rgba(255,255,255,.06)':''}">
          <div style="font-size:9px;letter-spacing:.1em;text-transform:uppercase;color:rgba(255,255,255,.3);margin-bottom:6px">${l}</div>
          <div style="font-family:'Playfair Display',serif;font-size:1.6rem;color:${bandColor(v||0)}">${v||'—'}</div>
          ${scoreBar(v||0)}
        </div>`).join('')}
    </div>
  </div>
  <button class="btn btn-red" onclick="openReport(0)" style="margin-bottom:16px">📋 Xem báo cáo đầy đủ →</button>
  ${buildQAList(e)}`;
}

// ── QA LIST ────────────────────────────────────────────────────
function buildQAList(e){
  if(!e.results.length) return '<div class="section"><div class="section-body" style="text-align:center;color:var(--grey);padding:30px">Không có dữ liệu chi tiết từng câu.</div></div>';
  const isCEFR = getModeInfo(e.simMode).part==='cefr';
  return `
  <div class="section">
    <div class="section-head">
      <span class="section-icon">${isCEFR?'💬':'🎙'}</span>
      <span class="section-title">${isCEFR?'Conversation Log':'Chi tiết từng câu'}</span>
      <span class="section-count">${e.results.length} câu</span>
    </div>
    <div class="section-body">
      ${e.results.map((r,i)=>{
        const q = r.q||r.question||e.questions[i]||`Question ${i+1}`;
        const a = r.a||r.studentAnswer||'';
        const band = r.overall||'';
        const corr = r.corrected||'';
        const sugg = r.suggestion||'';
        const sc = r.scores||{};
        const scCells = Object.keys(sc).length ? `
          <div class="qa-scores">
            ${[['fluency','FC'],['lexical','LR'],['grammar','GR'],['pronunciation','PR']].map(([k,lbl])=>`
              <div class="qa-score-cell">
                <div class="qa-score-val" style="color:${bandColor(sc[k]?.score||0)}">${sc[k]?.score||'—'}</div>
                <div class="qa-score-key">${lbl}</div>
              </div>`).join('')}
          </div>
          ${Object.entries(sc).filter(([,v])=>v?.comment).map(([k,v])=>`
            <div style="margin-top:8px;font-size:.8rem;color:var(--grey)"><strong>${k}:</strong> ${esc(v.comment)}</div>`).join('')}` : '';
        return `
        <div class="qa-card">
          <div class="qa-card-hdr" onclick="togQA(this)">
            <div class="qa-num-badge">${i+1}</div>
            <div class="qa-q-text">${esc(String(q).substring(0,120))}</div>
            ${band?`<div class="qa-band-pill">Band ${band}</div>`:''}
            <div class="qa-chevron">▼</div>
          </div>
          <div class="qa-card-body">
            <div class="qa-lbl">Your Answer</div>
            <div class="qa-answer">${esc(a)||'<em style="color:var(--grey)">[No answer recorded]</em>'}</div>
            ${corr?`<div class="qa-lbl">Corrected Version</div><div class="qa-corr">${esc(corr)}</div>`:''}
            ${sugg?`<div class="qa-lbl">Suggestion</div><div class="qa-sugg">${esc(sugg)}</div>`:''}
            ${r.summary?`<div class="qa-lbl">AI Summary</div><div style="font-size:.85rem;line-height:1.7;color:#444;margin-top:6px">${esc(r.summary)}</div>`:''}
            ${scCells}
          </div>
        </div>`;
      }).join('')}
    </div>
  </div>`;
}

function togQA(hdr){
  const body=hdr.nextElementSibling;
  const chev=hdr.querySelector('.qa-chevron');
  const open=body.classList.toggle('open');
  chev.textContent=open?'▲':'▼';
  chev.classList.toggle('open',open);
}

// ── FULL REPORT VIEW ───────────────────────────────────────────
function openReport(idx){
  const raw = S.rows[idx]; if(!raw) return;
  const e = parseRow(raw);
  const mi = getModeInfo(e.simMode);
  const scores = e.scores;

  // Criteria labels per mode
  const critKeys = mi.part==='cefr'
    ? [['fluency','Fluency'],['lexical','Vocabulary'],['grammar','Grammar'],['pronunciation','Coherence']]
    : [['fluency','Fluency & Coherence'],['lexical','Lexical Resource'],['grammar','Grammatical Range'],['pronunciation','Pronunciation']];

  const scoreCells = critKeys.map(([k,l])=>`
    <div class="score-cell">
      <div class="score-key">${l}</div>
      <div class="score-val" style="color:${bandColor(scores[k]||0)}">${scores[k]||'—'}</div>
      ${scoreBar(scores[k]||0)}
    </div>`).join('');

  document.getElementById('report-view').innerHTML = `
    <!-- Header -->
    <div class="header-card">
      <div class="header-top">
        <div>
          <div class="header-label">Speaking Report</div>
          <div class="header-name">${esc(e.name)}</div>
          <div class="header-meta">
            <span class="meta-item">🎙 Mode: <strong>${mi.label}${e.hints?' · With Hints':''}</strong></span>
            ${e.startTime?`<span class="meta-item">▶ <strong>${fmtDate(e.startTime)}</strong></span>`:''}
            ${e.endTime?`<span class="meta-item">✅ <strong>${fmtDate(e.endTime)}</strong></span>`:''}
            <span class="meta-item">⏱ <strong>${fmtDur(e.duration)}</strong></span>
            <span class="meta-item">🎙 <strong>${e.qCount} câu</strong></span>
            ${e.class?`<span class="meta-item">🎓 <strong>${esc(e.class)}</strong></span>`:''}
            ${e.studentId?`<span class="meta-item">🔑 <strong>${esc(e.studentId)}</strong></span>`:''}
          </div>
        </div>
        <div class="band-box">
          <div class="band-num" style="color:${bandColor(e.overall)}">${e.overall}</div>
          <div class="band-lbl">${mi.part==='cefr'?'CEFR Level':'Overall Band'}</div>
        </div>
      </div>
      <div class="scores-row">${scoreCells}</div>
    </div>

    <!-- Q&A detail -->
    ${buildQAList(e)}

    <div style="text-align:center;padding:28px 0 0;font-size:.75rem;color:var(--grey)">
      Developed by Dương Thanh Tú — DNU English Faculty
    </div>`;

  document.getElementById('report-view').className='active';
  document.getElementById('list-view').className='hidden';
  document.getElementById('btn-back').style.display='';
  document.getElementById('btn-print').style.display='';
  window.scrollTo(0,0);
}

function goBack(){
  document.getElementById('report-view').className='';
  document.getElementById('list-view').className='';
  document.getElementById('btn-back').style.display='none';
  document.getElementById('btn-print').style.display='none';
}
</script>
</body>
