[build]
  publish = "."

# ── Specific HTML pages — serve directly ──
[[redirects]]
  from = "/vocab.html"
  to   = "/vocab.html"
  status = 200

[[redirects]]
  from = "/listen.html"
  to   = "/listen.html"
  status = 200

[[redirects]]
  from = "/listen-detail.html"
  to   = "/listen-detail.html"
  status = 200

[[redirects]]
  from = "/write.html"
  to   = "/write.html"
  status = 200

[[redirects]]
  from = "/library.html"
  to   = "/library.html"
  status = 200

# ── Catch-all SPA fallback → Hub login ──
[[redirects]]
  from = "/*"
  to   = "/index.html"
  status = 200

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "SAMEORIGIN"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
