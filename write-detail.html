<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ArticuWrite — Report</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,600;0,700;1,600&family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  --ink:    #0E0E0C;
  --paper:  #F8F7F4;
  --cream:  #EDEAE2;
  --red:    #C8102E;
  --red-l:  #FDE8EC;
  --green:  #1A7A4A;
  --grn-l:  #E6F4ED;
  --gold:   #B45309;
  --gld-l:  #FEF3C7;
  --grey:   #77776E;
  --border: #DDD9CF;
  --shadow: 0 2px 16px rgba(14,14,12,.07);
}
*,*::before,*::after { box-sizing: border-box; margin: 0; padding: 0; }
html { scroll-behavior: smooth; }
@keyframes spin { to { transform: rotate(360deg); } }
body { font-family: 'DM Sans', sans-serif; background: var(--paper); color: var(--ink); min-height: 100vh; font-size: 15px; line-height: 1.65; -webkit-font-smoothing: antialiased; }

/* ── TOPBAR ── */
.topbar { background: var(--ink); height: 52px; display: flex; align-items: center; justify-content: space-between; padding: 0 28px; position: sticky; top: 0; z-index: 100; }
.brand { font-family: 'Playfair Display', serif; font-size: 1.1rem; color: #fff; }
.brand em { color: var(--red); font-style: normal; }
.topbar-right { display: flex; gap: 8px; }
.btn { display: inline-flex; align-items: center; gap: 6px; padding: 7px 16px; border: none; border-radius: 8px; font-family: 'DM Sans', sans-serif; font-size: 13px; font-weight: 600; cursor: pointer; transition: all .18s; text-decoration: none; white-space: nowrap; }
.btn-ghost { background: rgba(255,255,255,.1); color: rgba(255,255,255,.75); }
.btn-ghost:hover { background: rgba(255,255,255,.18); color: #fff; }
.btn-red { background: var(--red); color: #fff; }
.btn-red:hover { background: #a50d24; }
.btn-outline { background: transparent; border: 1.5px solid var(--border); color: var(--ink); }
.btn-outline:hover { border-color: var(--red); color: var(--red); }
.btn-sm { padding: 5px 12px; font-size: 12px; }

/* ── LAYOUT ── */
.page-wrap { max-width: 860px; margin: 0 auto; padding: 32px 24px 80px; }

/* ── HEADER CARD ── */
.header-card { background: var(--ink); border-radius: 16px; overflow: hidden; margin-bottom: 20px; }
.header-top { padding: 28px 32px; display: grid; grid-template-columns: 1fr auto; gap: 24px; align-items: center; }
.header-label { font-size: 10px; letter-spacing: .14em; text-transform: uppercase; color: rgba(255,255,255,.35); margin-bottom: 4px; }
.header-name { font-family: 'Playfair Display', serif; font-size: 1.7rem; color: #fff; margin-bottom: 10px; }
.header-meta { display: flex; gap: 16px; flex-wrap: wrap; }
.meta-item { font-size: 12px; color: rgba(255,255,255,.45); }
.meta-item strong { color: rgba(255,255,255,.85); }
.header-question { margin-top: 12px; font-size: 13px; color: rgba(255,255,255,.45); font-style: italic; line-height: 1.6; padding-top: 12px; border-top: 1px solid rgba(255,255,255,.08); }
.band-box { text-align: center; background: rgba(255,255,255,.06); border: 1.5px solid rgba(255,255,255,.12); border-radius: 12px; padding: 18px 28px; }
.band-num { font-family: 'Playfair Display', serif; font-size: 3.2rem; line-height: 1; margin-bottom: 4px; }
.band-lbl { font-size: 9px; letter-spacing: .15em; text-transform: uppercase; color: rgba(255,255,255,.3); }

/* ── SCORES ROW ── */
.scores-row { display: grid; grid-template-columns: repeat(4, 1fr); border-top: 1.5px solid rgba(255,255,255,.08); }
.score-cell { padding: 16px 20px; border-right: 1px solid rgba(255,255,255,.06); }
.score-cell:last-child { border-right: none; }
.score-key { font-size: 9px; letter-spacing: .12em; text-transform: uppercase; color: rgba(255,255,255,.3); margin-bottom: 6px; }
.score-val { font-family: 'Playfair Display', serif; font-size: 1.8rem; margin-bottom: 6px; }
.score-bar { height: 3px; background: rgba(255,255,255,.1); border-radius: 2px; overflow: hidden; }
.score-fill { height: 100%; border-radius: 2px; transition: width .6s ease; }

/* ── SECTIONS ── */
.section { background: #fff; border: 1.5px solid var(--border); border-radius: 14px; overflow: hidden; margin-bottom: 16px; box-shadow: var(--shadow); }
.section-head { display: flex; align-items: center; gap: 10px; padding: 14px 20px; border-bottom: 1.5px solid var(--border); background: var(--paper); }
.section-icon { font-size: 16px; }
.section-title { font-family: 'Playfair Display', serif; font-size: .92rem; color: var(--ink); }
.section-count { margin-left: auto; font-size: 11px; font-weight: 600; color: var(--grey); background: var(--cream); padding: 2px 9px; border-radius: 100px; }
.section-body { padding: 20px; }

/* ── OVERALL VI ── */
.overall-vi { font-size: .9rem; line-height: 1.85; color: #333; background: var(--grn-l); border-left: 3px solid var(--green); border-radius: 0 8px 8px 0; padding: 14px 18px; }

/* ── ESSAY ── */
.essay-box { font-size: .88rem; line-height: 1.9; color: #2a2a26; white-space: pre-wrap; background: var(--paper); border-radius: 8px; padding: 18px; border: 1px solid var(--border); font-family: 'DM Mono', monospace; }

/* ── CORRECTED ── */
.corrected-box { font-size: .88rem; line-height: 1.9; color: #2a2a26; }
.corrected-box p { margin-bottom: .8em; }
.err-orig { background: var(--red-l); color: var(--red); text-decoration: line-through; border-radius: 3px; padding: 0 3px; font-family: 'DM Mono', monospace; font-size: .82em; }
.err-fix  { background: var(--grn-l); color: var(--green); font-weight: 600; border-radius: 3px; padding: 0 3px; font-family: 'DM Mono', monospace; font-size: .82em; }
.corr-legend { display: flex; gap: 16px; font-size: 11px; color: var(--grey); margin-bottom: 14px; }

/* ── TR COMMENTS ── */
.tr-card { border: 1px solid var(--border); border-radius: 10px; padding: 16px; margin-bottom: 12px; }
.tr-card:last-child { margin-bottom: 0; }
.tr-num { font-size: 10px; font-weight: 700; letter-spacing: .08em; text-transform: uppercase; color: var(--green); margin-bottom: 8px; }
.tr-row { font-size: .85rem; color: #444; margin-bottom: 6px; line-height: 1.65; }
.tr-suggestion { margin-top: 8px; font-size: .82rem; font-style: italic; color: var(--green); background: var(--grn-l); border-radius: 6px; padding: 8px 12px; }

/* ── GRA ERRORS ── */
.gra-card { border: 1px solid #fecdd3; border-radius: 10px; padding: 14px 16px; margin-bottom: 10px; background: #fff5f6; }
.gra-card:last-child { margin-bottom: 0; }
.gra-badge { display: inline-block; font-size: 9px; font-weight: 700; letter-spacing: .1em; text-transform: uppercase; color: var(--red); background: var(--red-l); border-radius: 4px; padding: 2px 8px; margin-bottom: 8px; }
.gra-diff { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; margin-bottom: 8px; }
.gra-wrong { text-decoration: line-through; color: var(--red); font-family: 'DM Mono', monospace; font-size: .88rem; }
.gra-arrow { color: var(--grey); font-weight: 700; }
.gra-correct { color: var(--green); font-weight: 700; font-family: 'DM Mono', monospace; font-size: .88rem; }
.gra-expl { font-size: .82rem; color: #555; line-height: 1.65; }

/* ── LR ISSUES ── */
.lr-card { border: 1px solid #e9d5ff; border-radius: 10px; padding: 14px 16px; margin-bottom: 10px; background: #faf5ff; }
.lr-card:last-child { margin-bottom: 0; }
.lr-pair { font-weight: 700; color: #6d28d9; font-size: .9rem; margin-bottom: 6px; font-family: 'DM Mono', monospace; }
.lr-expl { font-size: .82rem; color: #555; margin-bottom: 6px; line-height: 1.65; }
.lr-alts { font-size: .8rem; color: var(--green); }

/* ── CC ── */
.cc-assess { font-size: .88rem; color: #333; line-height: 1.75; margin-bottom: 12px; }
.cc-sub { font-weight: 700; font-size: .8rem; text-transform: uppercase; letter-spacing: .06em; color: var(--grey); margin-bottom: 6px; }
.cc-list { list-style: none; padding: 0; margin-bottom: 10px; }
.cc-list li { font-size: .85rem; color: #444; padding: 5px 10px 5px 0; border-bottom: 1px solid var(--border); }
.cc-list li:last-child { border-bottom: none; }
.cc-list li::before { content: '• '; color: var(--grey); }

/* ── HISTORY TABLE ── */
.table-wrap { overflow-x: auto; border-radius: 10px; border: 1.5px solid var(--border); }
table { width: 100%; border-collapse: collapse; font-size: 13px; }
thead { background: var(--ink); }
th { padding: 10px 14px; text-align: left; font-size: 10px; font-weight: 700; letter-spacing: .08em; text-transform: uppercase; color: rgba(255,255,255,.5); white-space: nowrap; }
td { padding: 10px 14px; border-top: 1px solid var(--border); vertical-align: middle; }
tr:hover td { background: var(--paper); }
.band-pill { display: inline-block; font-weight: 700; font-size: .75rem; padding: 2px 10px; border-radius: 100px; }
.band-7 { background: var(--grn-l); color: var(--green); }
.band-6 { background: var(--gld-l); color: var(--gold); }
.band-5 { background: var(--red-l); color: var(--red); }
.mode-tag { display: inline-block; font-size: .72rem; font-weight: 600; padding: 2px 8px; border-radius: 6px; background: var(--cream); color: var(--grey); }

/* ── EMPTY STATE ── */
.empty-state { text-align: center; padding: 64px 32px; color: var(--grey); }
.empty-icon { font-size: 2.5rem; margin-bottom: 12px; }
.empty-title { font-family: 'Playfair Display', serif; font-size: 1.1rem; color: var(--ink); margin-bottom: 8px; }
.empty-state p { font-size: .85rem; max-width: 320px; margin: 0 auto; line-height: 1.7; }

/* ── TABS ── */
.tabs { display: flex; gap: 4px; background: var(--cream); border-radius: 10px; padding: 4px; margin-bottom: 24px; }
.tab { flex: 1; text-align: center; padding: 9px; border: none; border-radius: 7px; font-family: 'DM Sans', sans-serif; font-size: 13px; font-weight: 600; cursor: pointer; background: transparent; color: var(--grey); transition: all .18s; }
.tab.active { background: #fff; color: var(--ink); box-shadow: 0 1px 6px rgba(0,0,0,.1); }

/* ── ACCORDION CRITERION CARDS ── */
.acc-card { border-top: 1px solid var(--border); }
.acc-card:first-child { border-top: none; }
.acc-head { display:flex; align-items:center; padding:14px 20px; gap:12px; user-select:none; transition:background .15s; background:var(--ink); }
.acc-head:hover { background:#1e1e28; }
.acc-label { font-family:'Playfair Display',serif; font-size:.88rem; font-weight:600; color:var(--gold); }
.acc-score { font-family:'Playfair Display',serif; font-size:1.6rem; font-weight:700; line-height:1; min-width:36px; text-align:right; }
.acc-chevron { font-size:.7rem; color:rgba(255,255,255,.4); transition:transform .2s; }
.acc-body { border-top:1px solid var(--border); background:#fff; animation:fadeIn .2s ease; }
@keyframes fadeIn { from{opacity:0;transform:translateY(-4px)} to{opacity:1;transform:translateY(0)} }
@media print {
  .topbar, .tabs, .btn, .btn-red, .btn-ghost, .btn-outline { display: none !important; }
  .page-wrap { padding: 0; max-width: 100%; }
  .section { break-inside: avoid; box-shadow: none; border: 1px solid #ccc; }
  .header-card { break-inside: avoid; }
  body { font-size: 12px; }
}

/* ── REPORT VIEW ── */
#report-view { display: none; }
#report-view.active { display: block; }
#list-view.hidden { display: none; }

@media (max-width: 600px) {
  .header-top { grid-template-columns: 1fr; }
  .scores-row { grid-template-columns: repeat(2,1fr); }
  .band-box { width: fit-content; }
  .page-wrap { padding: 16px 14px 60px; }
}
</style>
</head>
<body>

<div class="topbar">
  <div class="brand">Articu<em>Write</em> <span style="font-family:'DM Sans',sans-serif;font-size:.7rem;color:rgba(255,255,255,.3);font-weight:400;margin-left:6px;letter-spacing:.08em;text-transform:uppercase">Reports</span></div>
  <div class="topbar-right">
    <button class="btn btn-ghost" onclick="goBack()" id="btn-back" style="display:none">← All Results</button>
    <button class="btn btn-ghost" onclick="exportHTML()" id="btn-export" style="display:none" title="Download as HTML → Upload to Google Drive → Google converts to Doc">📄 Export</button>
    <button class="btn btn-red" onclick="window.print()" id="btn-print" style="display:none">🖨 Print / Save PDF</button>
  </div>
</div>

<div class="page-wrap">

  <!-- TABS -->
  <div class="tabs" id="tabs-bar">
    <button class="tab active" onclick="switchTab('latest')">⚡ Latest Result</button>
    <button class="tab" onclick="switchTab('history')">📋 My History</button>
  </div>

  <!-- LIST VIEW -->
  <div id="list-view">
    <!-- Latest tab content -->
    <div id="tab-latest">
      <div id="latest-content">
        <div class="empty-state"><div class="empty-icon">📝</div><div class="empty-title">No recent result</div><p>Submit a writing in ArticuWrite to see your report here.</p></div>
      </div>
    </div>
    <!-- History tab content -->
    <div id="tab-history" style="display:none">
      <div id="history-content">
        <div class="empty-state"><div class="empty-icon">⏳</div><div class="empty-title">Loading history…</div></div>
      </div>
    </div>
  </div>

  <!-- FULL REPORT VIEW -->
  <div id="report-view"></div>

</div><!-- page-wrap -->

<script>
'use strict';
const HUB_GAS = 'https://script.google.com/macros/s/AKfycby6tUJxFfZ0hDe2EVD-e1uTDVEv-42ivsJyOzqMWI5LFaZnXsxgQcvYbZ9W2ADbObk-NQ/exec';

const S = { name: '', code: '', sessionToken: '', rows: [], currentEntry: null };

// ── Helpers ──────────────────────────────────────────────────
function esc(s) {
  return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}
function fmtDate(s) {
  try { const d = new Date(s); if (isNaN(d)) return s||'—'; return d.toLocaleString('vi-VN',{day:'2-digit',month:'2-digit',year:'numeric',hour:'2-digit',minute:'2-digit',hour12:false}); }
  catch(e) { return s||'—'; }
}
function fmtDuration(start, end) {
  try { const m = Math.round((new Date(end)-new Date(start))/60000); if(isNaN(m)||m<0) return '—'; const h=Math.floor(m/60),mm=m%60; return h>0?`${h}h${String(mm).padStart(2,'0')}m`:`${mm} min`; }
  catch(e) { return '—'; }
}
function bandColor(v) {
  const n = parseFloat(v);
  return n >= 7 ? 'var(--green)' : n >= 5.5 ? 'var(--gold)' : 'var(--red)';
}
function bandClass(v) {
  const n = parseFloat(v);
  return n >= 7 ? 'band-7' : n >= 5.5 ? 'band-6' : 'band-5';
}
function scoreBarHTML(v) {
  const pct = parseFloat(v) > 0 ? (parseFloat(v)/9*100)+'%' : '0%';
  return `<div class="score-bar"><div class="score-fill" style="width:${pct};background:${bandColor(v)}"></div></div>`;
}

// ── Corrected text renderer ──────────────────────────────────
function renderCorrected(txt) {
  if (!txt) return '';
  return txt.split(/\n{2,}/).map(para => {
    const lines = para.split(/\n/).map(ln =>
      ln.replace(/~~([^~]+)~~([^~]*)~~/g, (_, wrong, fix) =>
        fix && fix.trim()
          ? `<span class="err-orig">${esc(wrong)}</span>&nbsp;<span class="err-fix">${esc(fix.trim())}</span>`
          : esc(wrong)
      ).replace(/~~([^~]*)~~/g, (_, w) => esc(w))
    );
    return `<p>${lines.join('<br>')}</p>`;
  }).join('');
}

// ── Build full report HTML ────────────────────────────────────
function buildFullReport(entry) {
  const r       = entry.result || {};
  const scores  = r.scores  || entry.scores  || {};
  const overall = r.overall || entry.overall || '—';
  const mode    = entry.mode || '—';
  const fb      = r.feedback || {};

  // ── 4 criterion accordion cards ──────────────────────────────
  const criteria = [
    { key: 'TR',  label: 'Task Response',             icon: '📋', color: '#1A7A4A', colName: 'FeedbackTR'  },
    { key: 'CC',  label: 'Coherence & Cohesion',      icon: '🔗', color: '#1565C0', colName: 'FeedbackCC'  },
    { key: 'LR',  label: 'Lexical Resource',           icon: '📚', color: '#6d28d9', colName: 'FeedbackLR'  },
    { key: 'GRA', label: 'Grammatical Range & Accuracy', icon: '⚠️', color: '#B91C1C', colName: 'FeedbackGRA' }
  ];

  const accordionHTML = criteria.map(c => {
    const val = scores[c.key] || '—';
    const pct = parseFloat(val) > 0 ? (parseFloat(val)/9*100)+'%' : '0%';
    const clr = bandColor(val);
    const uid = 'acc-' + c.key;
    return `
    <div class="acc-card" id="${uid}-card">
      <div class="acc-head" onclick="toggleAccLazy('${uid}','${c.colName}')" style="cursor:pointer">
        <div style="display:flex;align-items:center;gap:10px;flex:1">
          <span style="font-size:1.1rem">${c.icon}</span>
          <div>
            <div class="acc-label">${c.label}</div>
            <div style="height:3px;width:80px;background:rgba(255,255,255,.15);border-radius:2px;margin-top:4px;overflow:hidden">
              <div style="height:100%;width:${pct};background:${clr};border-radius:2px"></div>
            </div>
          </div>
        </div>
        <div style="display:flex;align-items:center;gap:12px">
          <div class="acc-score" style="color:${clr}">${val}</div>
          <div class="acc-chevron" id="${uid}-chev">▼</div>
        </div>
      </div>
      <div class="acc-body" id="${uid}-body" style="display:none">
        <div class="section-body" id="${uid}-content">
          <div style="display:flex;align-items:center;gap:10px;padding:8px 0;color:var(--grey);font-size:.85rem">
            <div style="width:16px;height:16px;border:2px solid var(--border);border-top-color:var(--gold);border-radius:50%;animation:spin .8s linear infinite;flex-shrink:0"></div>
            Loading…
          </div>
        </div>
      </div>
    </div>`;
  }).join('');

  // Corrected version
  const corrected = r.corrected_text || '';
  const correctedHTML = corrected ? `
    <div class="section">
      <div class="section-head"><span class="section-icon">✅</span><span class="section-title">Corrected Version</span></div>
      <div class="section-body">
        <div class="corr-legend">
          <span><span class="err-orig">wrong</span> Original</span>
          <span><span class="err-fix">correct</span> Correction</span>
        </div>
        <div class="corrected-box">${renderCorrected(corrected)}</div>
      </div>
    </div>` : '';

  const overallVI = r.overall_feedback_vi ? `
    <div class="section">
      <div class="section-head"><span class="section-icon">💬</span><span class="section-title">Overall Assessment</span></div>
      <div class="section-body"><div class="overall-vi">${esc(r.overall_feedback_vi)}</div></div>
    </div>` : (fb.general ? `
    <div class="section">
      <div class="section-head"><span class="section-icon">💬</span><span class="section-title">Overall Assessment</span></div>
      <div class="section-body"><div class="overall-vi">${esc(fb.general)}</div></div>
    </div>` : '');

  const questionHTML = entry.question ? `
    <div class="section">
      <div class="section-head"><span class="section-icon">❓</span><span class="section-title">Task Question</span></div>
      <div class="section-body"><div style="font-size:.88rem;line-height:1.8;font-style:italic;color:var(--grey)">${esc(entry.question)}</div></div>
    </div>` : '';

  const writingHTML = entry.writing ? `
    <div class="section">
      <div class="section-head"><span class="section-icon">✍️</span><span class="section-title">Student's Writing</span></div>
      <div class="section-body"><div class="essay-box">${esc(entry.writing)}</div></div>
    </div>` : '';

  const hasAnyFeedback = r.overall_feedback_vi || r.tr_comments?.length || r.gra_errors?.length
    || r.lr_issues?.length || r.cc_feedback || r.corrected_text || fb.general;

  return `
    <!-- Header -->
    <div class="header-card">
      <div class="header-top">
        <div>
          <div class="header-label">Student Report</div>
          <div class="header-name">${esc(entry.name||'Student')}</div>
          <div class="header-meta">
            <span class="meta-item">📝 Mode: <strong>${esc(mode)}</strong></span>
            ${entry.startedAt ? `<span class="meta-item">▶ <strong>${fmtDate(entry.startedAt)}</strong></span>` : `<span class="meta-item">🕐 <strong>${fmtDate(entry.timestamp||entry.Timestamp||'')}</strong></span>`}
            ${entry.submittedAt ? `<span class="meta-item">✅ <strong>${fmtDate(entry.submittedAt)}</strong></span>` : ''}
            ${(entry.startedAt && entry.submittedAt) ? `<span class="meta-item">⏱ <strong>${fmtDuration(entry.startedAt, entry.submittedAt)}</strong></span>` : ''}
            ${entry.class ? `<span class="meta-item">🎓 <strong>${esc(entry.class)}</strong></span>` : ''}
            ${entry.code ? `<span class="meta-item">🔑 <strong>${esc(entry.code)}</strong></span>` : ''}
          </div>
          ${entry.question ? `<div class="header-question">${esc(entry.question.substring(0,240))}${entry.question.length>240?'…':''}</div>` : ''}
        </div>
        <div class="band-box">
          <div class="band-num" style="color:${bandColor(overall)}">${overall}</div>
          <div class="band-lbl">Overall Band</div>
        </div>
      </div>
      <!-- 4 criterion accordion cards in scores-row -->
      <div class="scores-row" style="display:block;padding:0">
        ${accordionHTML}
      </div>
    </div>

    <!-- Overall + Essay + Corrected -->
    ${overallVI}
    ${questionHTML}
    ${writingHTML}
    ${correctedHTML}

    ${!hasAnyFeedback && entry.writing ? `
    <div class="section" id="loading-feedback-section" style="border-color:var(--border);background:#fff">
      <div class="section-body" style="display:flex;align-items:center;gap:14px;padding:20px">

// ── Accordion: lazy fetch 1 cột khi click ────────────────────
async function toggleAccLazy(uid, colName) {
  const body = document.getElementById(uid + '-body');
  const chev = document.getElementById(uid + '-chev');
  if (!body) return;
  const isOpen = body.style.display !== 'none';
  // Toggle đóng/mở
  body.style.display = isOpen ? 'none' : 'block';
  if (chev) chev.textContent = isOpen ? '▼' : '▲';
  if (isOpen) return; // Đang đóng lại → không cần fetch

  const content = document.getElementById(uid + '-content');
  if (!content) return;

  // Nếu đã load rồi (không còn spinner) → không fetch lại
  if (!content.querySelector('[style*="border-radius:50%"]')) return;

  const entry = S.currentEntry;
  if (!entry) return;

  // Check cache
  const cacheKey = 'arw_col_' + (entry.name||'').toLowerCase().replace(/\s+/g,'_')
                 + '_' + (entry.timestamp||entry.submittedAt||'').substring(0,10)
                 + '_' + colName;
  const cached = localStorage.getItem(cacheKey);
  if (cached) {
    content.innerHTML = renderColContent(colName, cached);
    return;
  }

  // Fetch 1 cột từ GAS — ưu tiên submissionId, fallback name+timestamp
  try {
    const subId = entry?.submissionId || '';
    let res;
    if (subId) {
      res = await gasGet('write.getBySubId', {
        submissionId: subId, column: colName, sessionToken: S.sessionToken || ''
      });
    } else {
      res = await gasGet('write.getOneFeedback', {
        name: entry.name, timestamp: entry.timestamp || entry.submittedAt || '',
        column: colName, sessionToken: S.sessionToken || ''
      });
    }
    if (res?.success) {
      const value = res.value || '';
      localStorage.setItem(cacheKey, value);
      content.innerHTML = renderColContent(colName, value);
    } else {
      content.innerHTML = `<div style="color:var(--grey);font-size:.85rem">No feedback available.</div>`;
    }
  } catch(e) {
    content.innerHTML = `<div style="color:var(--grey);font-size:.85rem">Could not load feedback.</div>`;
  }
}

// Render nội dung 1 cột feedback thành HTML
function renderColContent(colName, value) {
  if (!value || !value.trim()) {
    return '<div style="color:var(--grey);font-size:.85rem">No detailed feedback for this criterion.</div>';
  }
  function tryParse(s) { try { return JSON.parse(s); } catch(e) { return null; } }
  const parsed = tryParse(value);

  if (colName === 'FeedbackTR') {
    const arr = Array.isArray(parsed) ? parsed : null;
    if (arr && arr.length) return arr.map((c,i) => `
      <div class="tr-card">
        <div class="tr-num">Comment ${i+1}</div>
        ${c.original_idea ? `<div class="tr-row"><strong>Original idea:</strong> "${esc(c.original_idea)}"</div>` : ''}
        ${c.assessment_vi ? `<div class="tr-row"><strong>Assessment:</strong> ${esc(c.assessment_vi)}</div>` : ''}
        ${c.suggestion_en ? `<div class="tr-suggestion">💡 ${esc(c.suggestion_en)}</div>` : ''}
      </div>`).join('');
    return `<div class="cc-assess">${esc(value)}</div>`;
  }

  if (colName === 'FeedbackCC') {
    const cc = parsed && typeof parsed === 'object' && !Array.isArray(parsed) ? parsed : null;
    if (cc) return `
      ${cc.assessment_vi ? `<div class="cc-assess">${esc(cc.assessment_vi)}</div>` : ''}
      ${(cc.issues||[]).length ? `<div class="cc-sub">❌ Issues</div><ul class="cc-list">${cc.issues.map(i=>`<li>${esc(i)}</li>`).join('')}</ul>` : ''}
      ${(cc.suggestions||[]).length ? `<div class="cc-sub">💡 Suggestions</div><ul class="cc-list">${cc.suggestions.map(s=>`<li>${esc(s)}</li>`).join('')}</ul>` : ''}`;
    return `<div class="cc-assess">${esc(value)}</div>`;
  }

  if (colName === 'FeedbackLR') {
    const arr = Array.isArray(parsed) ? parsed : null;
    if (arr && arr.length) return arr.map(iss => `
      <div class="lr-card">
        <div class="lr-pair">"${esc(iss.original||'')} → ${esc(iss.better||'')}"</div>
        ${iss.explanation_vi ? `<div class="lr-expl">${esc(iss.explanation_vi)}</div>` : ''}
        ${(iss.alternatives||[]).length ? `<div class="lr-alts"><strong>Alternatives:</strong> ${iss.alternatives.map(a=>esc(a)).join(' · ')}</div>` : ''}
      </div>`).join('');
    return `<div class="cc-assess">${esc(value)}</div>`;
  }

  if (colName === 'FeedbackGRA') {
    const arr = Array.isArray(parsed) ? parsed : null;
    if (arr && arr.length) return arr.map((e,i) => `
      <div class="gra-card">
        <div class="gra-badge">Error ${i+1}</div>
        <div class="gra-diff">
          <span class="gra-wrong">${esc(e.wrong||'')}</span>
          <span class="gra-arrow">→</span>
          <span class="gra-correct">${esc(e.correct||'')}</span>
        </div>
        ${e.explanation_vi ? `<div class="gra-expl">${esc(e.explanation_vi)}</div>` : ''}
      </div>`).join('');
    return `<div class="cc-assess">${esc(value)}</div>`;
  }

  // Default: plain text
  return `<div class="cc-assess">${esc(value)}</div>`;
}

// ── View full report ─────────────────────────────────────────
function viewFullReport(entry) {
  S.currentEntry = entry;
  document.getElementById('list-view').classList.add('hidden');
  document.getElementById('tabs-bar').style.display = 'none';
  const rv = document.getElementById('report-view');
  rv.innerHTML = buildFullReport(entry);
  rv.classList.add('active');
  document.getElementById('btn-back').style.display = '';
  document.getElementById('btn-export').style.display = '';
  document.getElementById('btn-print').style.display = '';
  window.scrollTo(0, 0);

  const r  = entry.result || {};
  const ts = entry.submittedAt || entry.timestamp || '';
  const nm = (entry.name || S.name || '').toLowerCase().replace(/\s+/g,'_');

  // Nếu entry.result đã có đủ feedback (vừa chấm xong) → cache vào localStorage
  // để toggleAccLazy và fetchOverallAndCorrected không cần fetch GAS
  if (r.overall_feedback_vi || r.tr_comments?.length || r.gra_errors?.length
      || r.lr_issues?.length || r.cc_feedback || r.corrected_text) {
    const dayKey = ts.substring(0, 10);
    const pre = 'arw_col_' + nm + '_' + dayKey + '_';
    // Cache Overall
    if (r.overall_feedback_vi)
      localStorage.setItem(pre + 'FeedbackOverall', r.overall_feedback_vi);
    // Cache Corrected
    if (r.corrected_text)
      localStorage.setItem(pre + 'EssayCorrected', r.corrected_text);
    // Cache TR
    if (r.tr_comments?.length)
      localStorage.setItem(pre + 'FeedbackTR', JSON.stringify(r.tr_comments));
    else if (r.feedback?.TR)
      localStorage.setItem(pre + 'FeedbackTR', r.feedback.TR);
    // Cache CC
    if (r.cc_feedback)
      localStorage.setItem(pre + 'FeedbackCC', JSON.stringify(r.cc_feedback));
    else if (r.feedback?.CC)
      localStorage.setItem(pre + 'FeedbackCC', r.feedback.CC);
    // Cache LR
    if (r.lr_issues?.length)
      localStorage.setItem(pre + 'FeedbackLR', JSON.stringify(r.lr_issues));
    else if (r.feedback?.LR)
      localStorage.setItem(pre + 'FeedbackLR', r.feedback.LR);
    // Cache GRA
    if (r.gra_errors?.length)
      localStorage.setItem(pre + 'FeedbackGRA', JSON.stringify(r.gra_errors));
    else if (r.feedback?.GRA)
      localStorage.setItem(pre + 'FeedbackGRA', r.feedback.GRA);
    return; // Đã có đủ data, không cần fetch GAS
  }

  // Không có feedback → fetch Overall + Corrected từ GAS
  if (entry.writing) fetchOverallAndCorrected(entry);
}

async function fetchOverallAndCorrected(entry) {
  const name  = entry.name || S.name;
  const ts    = entry.timestamp || entry.submittedAt || '';
  const subId = entry.submissionId || '';

  const ckOverall   = 'arw_col_' + name.toLowerCase().replace(/\s+/g,'_') + '_' + ts.substring(0,10) + '_FeedbackOverall';
  const ckCorrected = 'arw_col_' + name.toLowerCase().replace(/\s+/g,'_') + '_' + ts.substring(0,10) + '_EssayCorrected';

  let overall   = localStorage.getItem(ckOverall)   || '';
  let corrected = localStorage.getItem(ckCorrected) || '';

  // Fetch nếu chưa cache — ưu tiên submissionId
  if (!overall) {
    try {
      const res = subId
        ? await gasGet('write.getBySubId', { submissionId: subId, column: 'FeedbackOverall', sessionToken: S.sessionToken||'' })
        : await gasGet('write.getOneFeedback', { name, timestamp: ts, column: 'FeedbackOverall', sessionToken: S.sessionToken||'' });
      if (res?.success) { overall = res.value || ''; localStorage.setItem(ckOverall, overall); }
    } catch(e) {}
  }
  if (!corrected) {
    try {
      const res = subId
        ? await gasGet('write.getBySubId', { submissionId: subId, column: 'EssayCorrected', sessionToken: S.sessionToken||'' })
        : await gasGet('write.getOneFeedback', { name, timestamp: ts, column: 'EssayCorrected', sessionToken: S.sessionToken||'' });
      if (res?.success) { corrected = res.value || ''; localStorage.setItem(ckCorrected, corrected); }
    } catch(e) {}
  }

  if (!overall && !corrected) return;

  // Cập nhật entry.result và re-render chỉ phần overall + corrected
  if (!S.currentEntry || S.currentEntry.name !== name) return;
  S.currentEntry.result = S.currentEntry.result || {};
  if (overall)   S.currentEntry.result.overall_feedback_vi = overall;
  if (corrected) S.currentEntry.result.corrected_text      = corrected;

  // Re-render toàn bộ report với data mới
  document.getElementById('report-view').innerHTML = buildFullReport(S.currentEntry);
}

// User downloads .html → uploads to Google Drive → Google auto-converts to Doc
function exportHTML() {
  const entry = S.currentEntry;
  if (!entry) return;
  const html = buildExportHTML(entry);
  const blob = new Blob([html], { type: 'text/html;charset=utf-8' });
  const url  = URL.createObjectURL(blob);
  const a    = document.createElement('a');
  const name = (entry.name||'Student').replace(/[^a-z0-9]/gi,'_');
  const date = new Date(entry.submittedAt||entry.timestamp||Date.now()).toISOString().slice(0,10);
  a.href = url;
  a.download = `ArticuWrite_${name}_${date}.html`;
  a.click();
  URL.revokeObjectURL(url);
  // Show tip
  setTimeout(() => alert('✅ File downloaded!\n\nTo open in Google Docs:\n1. Upload the .html file to Google Drive\n2. Right-click → Open with → Google Docs\n\nOr just use Print → Save as PDF for a clean copy.'), 300);
}

function switchTab(tab) {
  document.querySelectorAll('.tab').forEach((t,i) => t.classList.toggle('active', (i===0&&tab==='latest')||(i===1&&tab==='history')));
  document.getElementById('tab-latest').style.display = tab === 'latest' ? '' : 'none';

// ── Load latest from localStorage ────────────────────────────
function loadLatestFromStorage() {
  const raw = localStorage.getItem('arw_last_result');
  const el  = document.getElementById('latest-content');
  if (!raw) {
    el.innerHTML = `<div class="empty-state"><div class="empty-icon">📝</div><div class="empty-title">No recent result</div><p>Submit a writing in ArticuWrite to see your report here.</p></div>`;
    return;
  }
  try {
    const entry = JSON.parse(raw);
    S.currentEntry = entry;
    S.latestEntry  = entry;  // giữ reference đầy đủ, không embed vào HTML
    if (entry.name) { S.name = entry.name; S.code = entry.code || ''; }
    // Cache feedback so History tab can show it without network call
    if (entry.result && entry.name && (entry.submittedAt || entry.timestamp)) {
      fbCacheSet(entry.name, entry.submittedAt || entry.timestamp, entry.result);
    }
    el.innerHTML = buildResultCard(entry);
  } catch(e) {
    el.innerHTML = `<div class="empty-state"><div class="empty-icon">⚠️</div><div class="empty-title">Error loading result</div></div>`;
  }
}

        <p style="margin-bottom:20px">Your past submissions are saved in Language Hub. Sign in to load them here.</p>
        <a href="./index.html" style="display:inline-block;background:var(--red);color:#fff;padding:11px 28px;border-radius:9px;font-weight:700;font-size:.9rem;text-decoration:none">← Sign in to Language Hub</a>
        <div style="margin-top:12px;font-size:.78rem;color:var(--grey)">After signing in, come back to ArticuWrite → My History</div>
      </div>`;
    return;
  }
  gasGet('write.getMyResults', { name: S.name, code: S.code, sessionToken: S.sessionToken })
    .then(res => {
      if (!res?.success || !res.rows?.length) {
        el.innerHTML = `<div class="empty-state"><div class="empty-icon">📭</div><div class="empty-title">No submissions yet</div></div>`;
        return;
      }
      S.rows = res.rows;
      renderHistoryTable(res.rows);
    })
    .catch(() => {
      el.innerHTML = `<div class="empty-state"><div class="empty-icon">⚠️</div><div class="empty-title">Could not load history</div><p>Check your connection.</p></div>`;
    });
}

function renderHistoryTable(rows) {
  const el = document.getElementById('history-content');
  el.innerHTML = `
    <div class="table-wrap">
      <table>
        <thead><tr>
          <th>#</th><th>Date</th><th>Mode</th>
          <th>TR</th><th>CC</th><th>LR</th><th>GRA</th>
          <th>Band</th><th></th>
        </tr></thead>
        <tbody>
          ${rows.map((r,i) => `<tr>
            <td style="color:var(--grey)">${rows.length-i}</td>
            <td style="font-size:.78rem">${fmtDate(r.SubmittedAt||r.Timestamp||r.timestamp||'')}</td>
            <td><span class="mode-tag">${esc(r.Mode||r.mode||'—')}</span></td>
            <td style="text-align:center">${r.TaskResponse||r.scores?.TR||'—'}</td>
            <td style="text-align:center">${r.Coherence||r.scores?.CC||'—'}</td>
            <td style="text-align:center">${r.Lexical||r.scores?.LR||'—'}</td>
            <td style="text-align:center">${r.Grammar||r.scores?.GRA||'—'}</td>
            <td><span class="band-pill ${bandClass(r.OverallBand||r.overall||0)}">${r.OverallBand||r.overall||'—'}</span></td>
            <td>
              <button class="btn btn-outline btn-sm" onclick="viewHistoryRow(${i})">👁 View</button>
            </td>
          </tr>`).join('')}
        </tbody>
      </table>
    </div>`;
}

// ── Feedback cache (localStorage) ────────────────────────────
function fbCacheKey(name, ts) {
  return 'arw_fb_' + (name||'').toLowerCase().replace(/\s+/g,'_') + '_' + (ts||'').substring(0,10);
}
function fbCacheGet(name, ts) {
  try { const v = localStorage.getItem(fbCacheKey(name,ts)); return v ? JSON.parse(v) : null; } catch(e) { return null; }
}
function fbCacheSet(name, ts, result) {
  try {
    localStorage.setItem(fbCacheKey(name,ts), JSON.stringify(result));
    // Prune old cache keys (keep max 20)
    const keys = Object.keys(localStorage).filter(k => k.startsWith('arw_fb_'));
    if (keys.length > 20) keys.slice(0, keys.length-20).forEach(k => localStorage.removeItem(k));
  } catch(e) {}
}

async function viewHistoryRow(idx) {
  const row = S.rows[idx];
  if (!row) return;
  const ts   = row.SubmittedAt || row.Timestamp || row.timestamp || '';
  const name = row.StudentName || row.studentName || S.name;

  // Build entry với data đã có từ list (scores, question, writing truncate)
  const entry = {
    name, ts,
    code:        row.AccessCode  || row.accessCode  || S.code,
    class:       row.Class       || row.class       || '',
    mode:        row.Mode        || row.mode        || '—',
    question:    row.Question    || row.question    || '',
    writing:     row.Essay       || row.essay       || '',
    startedAt:   row.StartedAt   || row.startedAt   || '',
    submittedAt: ts,
    timestamp:   ts,
    overall:     row.OverallBand || row.overall     || '',
    scores:      { TR: row.TaskResponse||'', CC: row.Coherence||'', LR: row.Lexical||'', GRA: row.Grammar||'' },
    result:      {}
  };

  // Check localStorage cache trước
  const cached = fbCacheGet(name, ts);
  if (cached) {
    entry.result = cached;
    viewFullReport(entry);
    return;
  }

  // Hiện report ngay với điểm số, đồng thời fetch feedback
  viewFullReport(entry);

  // Fetch 7 cột feedback nhỏ từ GAS (nhẹ hơn getRowDetail nhiều)
  try {
    const res = await gasGet('write.getFeedback', {
      name, timestamp: ts, sessionToken: S.sessionToken || ''
    });
    if (res?.success && res.feedback) {
      const fb = res.feedback;
      // Parse các cột thành result object
      const result = buildResultFromFeedbackCols(fb);
      entry.result  = result;
      if (fb.essay)    entry.writing  = fb.essay;
      if (fb.question) entry.question = fb.question;
      // Cache và re-render
      fbCacheSet(name, ts, result);
      S.currentEntry = entry;
      document.getElementById('report-view').innerHTML = buildFullReport(entry);
    }
  } catch(e) {
    console.warn('getFeedback error:', e.message);
  }
}

// Parse 7 cột feedback → result object mà buildFullReport hiểu được
function buildResultFromFeedbackCols(fb) {
  function tryParse(s) { try { return s ? JSON.parse(s) : null; } catch(e) { return null; } }
  const result = {
    overall_feedback_vi: fb.overall || '',
    corrected_text:      fb.corrected || '',
    tr_comments:  tryParse(fb.TR)  || (fb.TR  ? [{assessment_vi: fb.TR}]  : []),
    cc_feedback:  tryParse(fb.CC)  || (fb.CC  ? {assessment_vi: fb.CC}    : null),
    lr_issues:    tryParse(fb.LR)  || (fb.LR  ? [{explanation_vi: fb.LR}] : []),
    gra_errors:   tryParse(fb.GRA) || (fb.GRA ? [{explanation_vi: fb.GRA}]: []),
    feedback:     { general: fb.overall||'', TR: fb.TR||'', CC: fb.CC||'', LR: fb.LR||'', GRA: fb.GRA||'' },
    scores:       {}
  };
  return result;
}

// ── Auto re-grade silently when history row has no feedback ──
async function autoRegrade() {
  const entry = S.currentEntry;
  if (!entry || !entry.writing) return;
  try {
    const gasResp = await gasGet('write.regrade', {
      writing:      entry.writing,
      question:     entry.question || '',
      mode:         entry.mode     || 'IELTS Task 2',
      sessionToken: S.sessionToken || ''
    });
    if (!gasResp?.success || !gasResp?.result) {
      // Failed silently — show minimal message, don't block
      const sec = document.getElementById('auto-regrade-section');
      if (sec) sec.innerHTML = '<div class="section-body" style="padding:14px 20px;font-size:.82rem;color:var(--grey)">⚠️ Could not load feedback. Check connection or try again later.</div>';
      return;
    }
    const result = gasResp.result;
    // Merge + re-render full report
    S.currentEntry = { ...entry, result, overall: result.overall || entry.overall, scores: result.scores || entry.scores };
    document.getElementById('report-view').innerHTML = buildFullReport(S.currentEntry);
    // Save back to sheet
    saveRegradeResult(S.currentEntry, result);
    // Cache locally so History shows feedback next time without network
    fbCacheSet(S.currentEntry.name, S.currentEntry.timestamp || S.currentEntry.submittedAt, result);
    // Save to localStorage cache
    fbCacheSet(S.currentEntry.name, S.currentEntry.timestamp || S.currentEntry.submittedAt, result);
  } catch(e) {
    const sec = document.getElementById('auto-regrade-section');
    if (sec) sec.innerHTML = '<div class="section-body" style="padding:14px 20px;font-size:.82rem;color:var(--grey)">⚠️ Could not load feedback.</div>';
  }
}

// ── Re-grade via GAS (uses teacher AI key, no student key needed) ──
async function reGrade() {
  const entry = S.currentEntry;
  if (!entry || !entry.writing) return;

  const btn = document.getElementById('btn-regrade');
  if (btn) { btn.textContent = '\u23F3 Grading\u2026'; btn.disabled = true; }

  try {
    const payload = {
      writing:      entry.writing,
      question:     entry.question || '',
      mode:         entry.mode     || 'IELTS Task 2',
      sessionToken: S.sessionToken || ''
    };

    // Try JSONP GET (works cross-origin)
    const gasResp = await gasGet('write.regrade', payload);

    if (gasResp?.error === 'RATE_LIMIT') throw new Error('Daily re-grade limit reached (5/day). Try again tomorrow.');
    if (!gasResp?.success) throw new Error(gasResp?.error || 'Re-grade failed. Please try again later.');

    const result = gasResp.result;
    if (!result) throw new Error('No result returned.');

    // Merge and re-render
    S.currentEntry = { ...entry, result, overall: result.overall || entry.overall, scores: result.scores || entry.scores };
    document.getElementById('report-view').innerHTML = buildFullReport(S.currentEntry);

    // Save back to sheet so next open no re-grade needed
    saveRegradeResult(S.currentEntry, result);

  } catch(e) {
    alert('Re-grade failed: ' + e.message);
    if (btn) { btn.textContent = '\u2728 Re-grade with AI'; btn.disabled = false; }
  }
}

// ── Save re-grade result back to sheet ───────────────────────
function saveRegradeResult(entry, result) {
  const scores = result.scores || entry.scores || {};
  const payload = {
    name:        entry.name        || S.name || '',
    timestamp:   entry.submittedAt || entry.timestamp || '',
    feedbackJSON: JSON.stringify(result),
    overall:     String(result.overall || entry.overall || ''),
    TR:  String(scores.TR  || ''),
    CC:  String(scores.CC  || ''),
    LR:  String(scores.LR  || ''),
    GRA: String(scores.GRA || ''),
    sessionToken: S.sessionToken || ''
  };
  fetch(HUB_GAS, {
    method: 'POST',
    mode: 'no-cors',
    headers: { 'Content-Type': 'text/plain;charset=utf-8' },
    body: JSON.stringify({ action: 'write.updateFeedback', payload, sessionToken: S.sessionToken || '' })
  }).catch(() => {});
}


// ── gasPost: fetch POST (faster, no JSONP timeout) ──
async function gasPost(action, payload) {
  payload = payload || {};
  const body = JSON.stringify({ action, payload, sessionToken: S.sessionToken || '' });
  try {
    const resp = await fetch(HUB_GAS, {
      method: 'POST',
      headers: { 'Content-Type': 'text/plain;charset=utf-8' },
      body
    });
    if (resp.ok) return await resp.json();
  } catch(e) {}
  return null;
}

function gasGet(action, payload) {
  payload = payload || {};
  return new Promise((resolve, reject) => {
    const cb = 'wd_cb_' + Date.now() + '_' + Math.floor(Math.random()*99999);
    const params = 'callback=' + encodeURIComponent(cb)
      + '&action=' + encodeURIComponent(action)
      + '&payload=' + encodeURIComponent(JSON.stringify(payload))
      + '&sessionToken=' + encodeURIComponent(payload.sessionToken||'');
    const s = document.createElement('script');
    s.src = HUB_GAS + '?' + params;
    const t = setTimeout(() => { cleanup(); reject(new Error('Timeout')); }, 15000);
    window[cb] = r => { cleanup(); resolve(r); };
    const cleanup = () => { clearTimeout(t); delete window[cb]; s.parentNode&&s.parentNode.removeChild(s); };
    s.onerror = () => { cleanup(); reject(new Error('Network error')); };
    document.head.appendChild(s);
  });
}

// ── Boot ─────────────────────────────────────────────────────
(function() {
  // Hub session — try sessionStorage first, then localStorage (persists across tabs)
  const tok = sessionStorage.getItem('ielts_hub_token') || localStorage.getItem('ielts_hub_token');
  const usr = sessionStorage.getItem('ielts_hub_user')  || localStorage.getItem('ielts_hub_user');
  if (tok && usr) {
    try { const u = JSON.parse(usr); S.name = u.fullName||u.FullName||''; S.sessionToken = tok; } catch(e) {}
  }
  const arTok = sessionStorage.getItem('articu_session') || localStorage.getItem('articu_session');
  if (arTok) S.sessionToken = S.sessionToken || arTok;
  S.code = localStorage.getItem('arw_student_code') || '';

  // Fallback: get name from last result in localStorage
  if (!S.name) {
    try {
      const last = JSON.parse(localStorage.getItem('arw_last_result') || '{}');
      if (last.name) { S.name = last.name; S.code = S.code || last.code || ''; }
    } catch(e) {}
  }

  // ?row= param from teacher dashboard
  const urlParams = new URLSearchParams(window.location.search);
  const rowParam  = urlParams.get('row');
  if (rowParam) {
    try {
      const entry = JSON.parse(decodeURIComponent(rowParam));
      S.name = entry.name || S.name;
      S.code = entry.code || S.code;
      if (entry.needDetail) {
        // Fetch full FeedbackJSON from GAS via POST (fast, no CORS timeout)
        setTimeout(async () => {
          try {
            const res = await gasPost('write.getRowDetail', {
              name: entry.name,
              timestamp: entry.timestamp || entry.submittedAt || ''
            });
            if (res?.success && res.row?.FeedbackJSON) {
              try { entry.result = JSON.parse(res.row.FeedbackJSON); } catch(e) {}
              if (res.row.Essay) entry.writing = res.row.Essay;
            }
          } catch(e) {}
          viewFullReport(entry);
        }, 50);
      } else {
        setTimeout(() => viewFullReport(entry), 50);
      }
    } catch(e) { console.warn('Invalid row param:', e); }
  }

  loadLatestFromStorage();
  fetchHistory();
  // Auto-switch to history tab if opened via #history hash
  if (window.location.hash === '#history') {
    setTimeout(() => switchTab('history'), 100);
  }
})();
</script>
