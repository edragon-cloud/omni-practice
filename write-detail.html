<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ArticuWrite — Writing Reports</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  --ink:     #0E0E0C;
  --paper:   #F8F7F4;
  --cream:   #EDE9E1;
  --red:     #C8102E;
  --red-l:   #FDE8EC;
  --green:   #1A7A4A;
  --green-l: #E6F4ED;
  --gold:    #B45309;
  --gold-l:  #FEF3C7;
  --grey:    #77776E;
  --border:  #E0DDD6;
  --shadow:  0 4px 24px rgba(14,14,12,.08);
  --r:       12px;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: 'DM Sans', sans-serif;
  background: var(--paper);
  color: var(--ink);
  min-height: 100vh;
}

/* ── TOP BAR ── */
.topbar {
  background: var(--ink);
  padding: 0 32px;
  height: 56px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  position: sticky;
  top: 0;
  z-index: 100;
}
.brand {
  font-family: 'DM Serif Display', serif;
  font-size: 1.25rem;
  color: #fff;
  letter-spacing: -.02em;
}
.brand em { color: var(--red); font-style: normal; }
.topbar-actions { display: flex; gap: 10px; align-items: center; }
.btn {
  display: inline-flex; align-items: center; gap: 6px;
  padding: 7px 16px;
  border-radius: 8px;
  font-family: 'DM Sans', sans-serif;
  font-size: .82rem;
  font-weight: 600;
  cursor: pointer;
  border: none;
  transition: all .18s;
  text-decoration: none;
}
.btn-ghost { background: rgba(255,255,255,.08); color: rgba(255,255,255,.8); }
.btn-ghost:hover { background: rgba(255,255,255,.16); color: #fff; }
.btn-red { background: var(--red); color: #fff; }
.btn-red:hover { background: #a50d25; }
.btn-outline { background: transparent; border: 1.5px solid var(--border); color: var(--ink); }
.btn-outline:hover { border-color: var(--ink); }
.btn-green { background: var(--green); color: #fff; }
.btn-green:hover { background: #155a38; }

/* ── MAIN LAYOUT ── */
.container { max-width: 1100px; margin: 0 auto; padding: 32px 24px 80px; }

/* ── PAGE TITLE ── */
.page-header {
  margin-bottom: 32px;
}
.page-title {
  font-family: 'DM Serif Display', serif;
  font-size: 2rem;
  color: var(--ink);
  margin-bottom: 4px;
}
.page-sub { font-size: .88rem; color: var(--grey); }

/* ── TABS ── */
.tabs {
  display: flex;
  gap: 0;
  border-bottom: 2px solid var(--border);
  margin-bottom: 28px;
}
.tab {
  padding: 10px 20px;
  font-size: .85rem;
  font-weight: 600;
  color: var(--grey);
  cursor: pointer;
  border-bottom: 2px solid transparent;
  margin-bottom: -2px;
  transition: all .18s;
}
.tab.active { color: var(--red); border-bottom-color: var(--red); }
.tab-pane { display: none; }
.tab-pane.active { display: block; }

/* ── RESULTS TABLE ── */
.table-wrap { overflow-x: auto; border-radius: var(--r); border: 1.5px solid var(--border); }
table { width: 100%; border-collapse: collapse; }
thead th {
  background: var(--ink);
  color: #fff;
  padding: 12px 16px;
  text-align: left;
  font-size: .75rem;
  font-weight: 600;
  letter-spacing: .06em;
  text-transform: uppercase;
  white-space: nowrap;
}
tbody tr { border-bottom: 1px solid var(--border); transition: background .15s; }
tbody tr:last-child { border-bottom: none; }
tbody tr:hover { background: var(--cream); }
tbody td { padding: 13px 16px; font-size: .88rem; vertical-align: middle; }
.band-pill {
  display: inline-block;
  padding: 3px 10px;
  border-radius: 20px;
  font-weight: 700;
  font-size: .82rem;
}
.band-7 { background: var(--green-l); color: var(--green); }
.band-6 { background: var(--gold-l);  color: var(--gold); }
.band-5 { background: var(--red-l);   color: var(--red); }
.mode-tag {
  display: inline-block;
  padding: 2px 8px;
  border-radius: 4px;
  background: var(--cream);
  color: var(--grey);
  font-size: .72rem;
  font-weight: 600;
}
.score-cell { font-family: 'DM Mono', monospace; font-weight: 500; }
.empty-state {
  text-align: center;
  padding: 60px 24px;
  color: var(--grey);
}
.empty-icon { font-size: 3rem; margin-bottom: 12px; }
.empty-title { font-size: 1rem; font-weight: 600; margin-bottom: 6px; color: var(--ink); }

/* ── FULL REPORT ── */
#report-view { display: none; }

.report-topbar {
  background: var(--ink);
  padding: 14px 32px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 16px;
  position: sticky;
  top: 56px;
  z-index: 90;
}
.report-title-bar {
  font-family: 'DM Serif Display', serif;
  font-size: 1rem;
  color: #fff;
}
.report-actions { display: flex; gap: 8px; }

.report-body { padding: 40px 0; }

.report-header-card {
  background: var(--ink);
  border-radius: var(--r);
  padding: 28px 32px;
  margin-bottom: 28px;
  display: grid;
  grid-template-columns: 1fr auto;
  gap: 24px;
  align-items: center;
}
.report-student { color: rgba(255,255,255,.55); font-size: .75rem; letter-spacing: .08em; text-transform: uppercase; margin-bottom: 4px; }
.report-name { font-family: 'DM Serif Display', serif; font-size: 1.8rem; color: #fff; margin-bottom: 8px; }
.report-meta { display: flex; gap: 16px; flex-wrap: wrap; }
.report-meta-item { font-size: .8rem; color: rgba(255,255,255,.55); }
.report-meta-item strong { color: rgba(255,255,255,.9); }

.band-display {
  text-align: center;
  background: rgba(255,255,255,.06);
  border: 1.5px solid rgba(255,255,255,.12);
  border-radius: var(--r);
  padding: 20px 28px;
}
.band-num {
  font-family: 'DM Serif Display', serif;
  font-size: 3.5rem;
  font-weight: 400;
  line-height: 1;
  margin-bottom: 4px;
}
.band-lbl { font-size: .65rem; letter-spacing: .15em; text-transform: uppercase; color: rgba(255,255,255,.4); }

/* Scores grid */
.scores-grid {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 12px;
  margin-bottom: 28px;
}
.score-card {
  background: #fff;
  border: 1.5px solid var(--border);
  border-radius: var(--r);
  padding: 16px 18px;
}
.score-label { font-size: .65rem; font-weight: 700; letter-spacing: .1em; text-transform: uppercase; color: var(--grey); margin-bottom: 8px; }
.score-value { font-family: 'DM Serif Display', serif; font-size: 2rem; color: var(--ink); line-height: 1; margin-bottom: 4px; }
.score-bar { height: 3px; background: var(--border); border-radius: 2px; overflow: hidden; }
.score-fill { height: 100%; border-radius: 2px; transition: width .6s ease; }

/* Sections */
.section {
  background: #fff;
  border: 1.5px solid var(--border);
  border-radius: var(--r);
  margin-bottom: 20px;
  overflow: hidden;
}
.section-head {
  padding: 14px 20px;
  border-bottom: 1.5px solid var(--border);
  display: flex;
  align-items: center;
  gap: 10px;
}
.section-head-icon { font-size: 1.1rem; }
.section-head-title {
  font-size: .78rem;
  font-weight: 700;
  letter-spacing: .08em;
  text-transform: uppercase;
  color: var(--ink);
}
.section-body { padding: 20px; }

.essay-text {
  font-size: .95rem;
  line-height: 1.95;
  color: var(--ink);
  white-space: pre-wrap;
}
.corrected-text { font-size: .95rem; line-height: 1.95; color: var(--ink); }
.corrected-text p { margin-bottom: 1.1em; }
.err-orig { text-decoration: line-through; color: var(--red); font-weight: 600; }
.err-fix { color: var(--green); font-weight: 700; }

.corr-legend {
  display: flex; gap: 20px; flex-wrap: wrap;
  padding: 10px 20px;
  background: var(--cream);
  border-bottom: 1.5px solid var(--border);
  font-size: .75rem; color: var(--grey);
}

/* Feedback components */
.overall-vi {
  padding: 14px 16px;
  background: var(--green-l);
  border-left: 3px solid var(--green);
  border-radius: 0 8px 8px 0;
  font-size: .88rem;
  line-height: 1.75;
  color: var(--ink);
  margin-bottom: 16px;
}

.tr-card {
  border: 1.5px solid #C8E6C9;
  border-left: 3px solid var(--green);
  border-radius: 0 8px 8px 0;
  padding: 14px 16px;
  margin-bottom: 12px;
  background: #F8FFF8;
}
.tr-num { font-size: .65rem; font-weight: 700; letter-spacing: .1em; text-transform: uppercase; color: var(--green); margin-bottom: 6px; }
.tr-row { font-size: .85rem; line-height: 1.65; margin-bottom: 4px; }
.tr-suggestion { font-size: .82rem; color: #2E7D32; font-style: italic; padding: 8px 10px; margin-top: 6px; background: rgba(200,230,201,.3); border-radius: 6px; }

.gra-card {
  border: 1.5px solid #FFCDD2;
  border-radius: 8px;
  padding: 12px 14px;
  margin-bottom: 10px;
  background: #FFF8F8;
}
.gra-badge { display: inline-block; background: #FFCDD2; color: #C62828; font-size: .65rem; font-weight: 800; padding: 2px 8px; border-radius: 3px; letter-spacing: .06em; margin-bottom: 8px; }
.gra-diff { font-size: .9rem; margin-bottom: 6px; }
.gra-wrong { text-decoration: line-through; color: var(--red); background: rgba(200,16,46,.07); padding: 1px 4px; border-radius: 3px; }
.gra-arrow { color: var(--grey); font-weight: 700; padding: 0 6px; }
.gra-correct { color: var(--green); font-weight: 700; }
.gra-expl { font-size: .78rem; color: var(--grey); }

.lr-card {
  border-left: 3px solid #9C27B0;
  background: #FAF5FF;
  border-radius: 0 8px 8px 0;
  padding: 12px 14px;
  margin-bottom: 10px;
}
.lr-pair { font-size: .88rem; font-weight: 700; color: #6A1B9A; margin-bottom: 4px; }
.lr-expl { font-size: .82rem; color: var(--ink); margin-bottom: 4px; }
.lr-alts { font-size: .78rem; color: var(--green); }

.cc-assess { font-size: .88rem; line-height: 1.7; padding: 10px 14px; background: #EFF4FF; border-radius: 8px; margin-bottom: 10px; }
.cc-sub { font-size: .72rem; font-weight: 700; letter-spacing: .05em; text-transform: uppercase; color: var(--grey); margin: 10px 0 6px; }
.cc-list { padding-left: 18px; font-size: .85rem; color: var(--ink); line-height: 1.7; }
.cc-list li { margin-bottom: 3px; }

/* Print styles */
@media print {
  .topbar, .report-topbar, #list-view { display: none !important; }
  #report-view { display: block !important; }
  .section { break-inside: avoid; page-break-inside: avoid; }
  body { background: #fff; }
  .report-header-card { background: #1A1A16; -webkit-print-color-adjust: exact; print-color-adjust: exact; }
}

@media (max-width: 700px) {
  .scores-grid { grid-template-columns: repeat(2, 1fr); }
  .report-header-card { grid-template-columns: 1fr; }
  .container { padding: 20px 16px 60px; }
}

/* Loading */
.loading { text-align: center; padding: 60px; color: var(--grey); font-size: .9rem; }
.spinner { width: 32px; height: 32px; border: 3px solid var(--border); border-top-color: var(--red); border-radius: 50%; animation: spin .7s linear infinite; margin: 0 auto 16px; }
@keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>

<!-- TOP BAR -->
<div class="topbar">
  <div class="brand">Articu<em>Write</em> <span style="color:rgba(255,255,255,.3);font-size:.8rem;font-weight:400;margin-left:6px">Reports</span></div>
  <div class="topbar-actions">
    <button class="btn btn-ghost" onclick="showListView()">← All Results</button>
    <button class="btn btn-red" onclick="window.print()" id="btn-print" style="display:none">🖨 Print / Save PDF</button>
  </div>
</div>

<!-- MAIN -->
<div class="container">

  <!-- LIST VIEW -->
  <div id="list-view">
    <div class="page-header">
      <div class="page-title">Writing Reports</div>
      <div class="page-sub" id="page-sub-text">Loading your results…</div>
    </div>

    <div class="tabs">
      <div class="tab active" onclick="switchTab('latest')">📝 Latest Result</div>
      <div class="tab" onclick="switchTab('history')">📋 All History</div>
    </div>

    <!-- Latest Result Tab -->
    <div class="tab-pane active" id="tab-latest">
      <div id="latest-content"><div class="loading"><div class="spinner"></div>Loading…</div></div>
    </div>

    <!-- History Tab -->
    <div class="tab-pane" id="tab-history">
      <div id="history-content"><div class="loading"><div class="spinner"></div>Loading history…</div></div>
    </div>
  </div>

  <!-- REPORT VIEW (full detail) -->
  <div id="report-view"></div>

</div><!-- /container -->

<script>
const HUB_GAS = 'https://script.google.com/macros/s/AKfycby6tUJxFfZ0hDe2EVD-e1uTDVEv-42ivsJyOzqMWI5LFaZnXsxgQcvYbZ9W2ADbObk-NQ/exec';

// ── State ──
var S = { code: '', name: '', sessionToken: '', rows: [], currentRow: null };

// ── Boot ──
(function() {
  // Try Hub session first
  const tok = sessionStorage.getItem('ielts_hub_token');
  const usr = sessionStorage.getItem('ielts_hub_user');
  if (tok && usr) {
    try {
      const u = JSON.parse(usr);
      S.name  = u.fullName || u.FullName || '';
      S.sessionToken = tok;
    } catch(e) {}
  }
  // Try Articuwrite session
  const arTok = sessionStorage.getItem('articu_session');
  if (arTok) S.sessionToken = S.sessionToken || arTok;
  const arCode = localStorage.getItem('arw_student_code') || '';
  S.code = arCode;

  // Check for teacher ?row= param first
  const urlParams = new URLSearchParams(window.location.search);
  const rowParam = urlParams.get('row');
  if (rowParam) {
    try {
      const entry = JSON.parse(decodeURIComponent(rowParam));
      S.currentRow = entry;
      S.name = entry.name || '';
      S.code = entry.code || '';
      // Auto-open report view
      setTimeout(() => viewFullReport(entry), 50);
    } catch(e) {
      console.warn('Invalid row param:', e);
    }
  }
  // Load latest from localStorage immediately
  loadLatestFromStorage();
  // Then fetch history from GAS
  fetchHistory();
})();

// ── Tabs ──
function switchTab(tab) {
  document.querySelectorAll('.tab').forEach((t,i) => t.classList.toggle('active', (i===0&&tab==='latest')||(i===1&&tab==='history')));
  document.getElementById('tab-latest').classList.toggle('active', tab === 'latest');
  document.getElementById('tab-history').classList.toggle('active', tab === 'history');
}

// ── Load latest result from localStorage ──
function loadLatestFromStorage() {
  const raw = localStorage.getItem('arw_last_result');
  const el  = document.getElementById('latest-content');
  if (!raw) {
    el.innerHTML = `<div class="empty-state"><div class="empty-icon">📝</div><div class="empty-title">No recent result</div><p>Submit a writing in ArticuWrite to see your report here.</p></div>`;
    document.getElementById('page-sub-text').textContent = 'No recent result found.';
    return;
  }
  try {
    const entry = JSON.parse(raw);
    S.currentRow = entry;
    if (entry.name) { S.name = entry.name; S.code = entry.code || ''; }
    document.getElementById('page-sub-text').textContent = 'Welcome, ' + entry.name;
    el.innerHTML = buildResultCard(entry, true);
  } catch(e) {
    el.innerHTML = `<div class="empty-state"><div class="empty-icon">⚠️</div><div class="empty-title">Error loading result</div></div>`;
  }
}

// ── Fetch history from GAS ──
function fetchHistory() {
  if (!S.name && !S.code) {
    document.getElementById('history-content').innerHTML = `<div class="empty-state"><div class="empty-icon">🔒</div><div class="empty-title">Not logged in</div><p>Please open this page from ArticuWrite after submitting a result.</p></div>`;
    return;
  }
  gasGet('write.getMyResults', { name: S.name, code: S.code, sessionToken: S.sessionToken })
    .then(res => {
      if (!res || !res.success) {
        document.getElementById('history-content').innerHTML = `<div class="empty-state"><div class="empty-icon">📭</div><div class="empty-title">No history yet</div><p>Your submitted results will appear here.</p></div>`;
        return;
      }
      S.rows = res.rows || [];
      renderHistoryTable(S.rows);
    })
    .catch(() => {
      document.getElementById('history-content').innerHTML = `<div class="empty-state"><div class="empty-icon">⚠️</div><div class="empty-title">Could not load history</div><p>Check your connection and try again.</p></div>`;
    });
}

// ── Render history table ──
function renderHistoryTable(rows) {
  const el = document.getElementById('history-content');
  if (!rows.length) {
    el.innerHTML = `<div class="empty-state"><div class="empty-icon">📭</div><div class="empty-title">No submissions yet</div></div>`;
    return;
  }
  const fmtDate = s => { try { const d = new Date(s); if(isNaN(d)) return s||'—'; return d.toLocaleDateString('vi-VN',{day:'2-digit',month:'2-digit',year:'numeric',hour:'2-digit',minute:'2-digit',hour12:false}); } catch(e) { return s||'—'; } };
  const fmtDuration = (start, end) => { try { const m = Math.round((new Date(end)-new Date(start))/60000); if(isNaN(m)||m<0) return '—'; const h=Math.floor(m/60),mm=m%60; return h>0?`${h}h${String(mm).padStart(2,'0')}m`:`${mm} min`; } catch(e) { return '—'; } };
  const bandClass = b => parseFloat(b) >= 7 ? 'band-7' : parseFloat(b) >= 5.5 ? 'band-6' : 'band-5';
  el.innerHTML = `
    <div class="table-wrap">
      <table>
        <thead><tr>
          <th>#</th>
          <th>Date & Time</th>
          <th>Mode</th>
          <th>TR</th><th>CC</th><th>LR</th><th>GRA</th>
          <th>Overall</th>
          <th></th>
        </tr></thead>
        <tbody>
          ${rows.map((r,i) => `<tr>
            <td style="color:var(--grey)">${rows.length-i}</td>
            <td style="font-size:.8rem">${fmtDate(r.Timestamp||r.timestamp||'')}</td>
            <td><span class="mode-tag">${esc(r.Mode||r.mode||'—')}</span></td>
            <td class="score-cell">${r.TaskResponse||r.scores?.TR||'—'}</td>
            <td class="score-cell">${r.Coherence||r.scores?.CC||'—'}</td>
            <td class="score-cell">${r.Lexical||r.scores?.LR||'—'}</td>
            <td class="score-cell">${r.Grammar||r.scores?.GRA||'—'}</td>
            <td><span class="band-pill ${bandClass(r.OverallBand||r.overall||0)}">${r.OverallBand||r.overall||'—'}</span></td>
            <td><button class="btn btn-outline" style="padding:5px 12px;font-size:.75rem" onclick="viewHistoryRow(${i})">👁 View</button></td>
          </tr>`).join('')}
        </tbody>
      </table>
    </div>`;
}

// ── Build result card (for latest tab) ──
function buildResultCard(entry, showViewBtn) {
  const r = entry.result || {};
  const scores = r.scores || entry.scores || {};
  const overall = r.overall || entry.overall || '—';
  const mode = entry.mode || '—';
  const fmtDate = s => { try { const d=new Date(s); if(isNaN(d)) return s||'—'; return d.toLocaleString('vi-VN',{hour12:false}); } catch(e) { return s||'—'; } };
  const fmtDuration = (start, end) => { try { const m = Math.round((new Date(end)-new Date(start))/60000); if(isNaN(m)||m<0) return '—'; const h=Math.floor(m/60),mm=m%60; return h>0?`${h}h${String(mm).padStart(2,'0')}m`:`${mm} min`; } catch(e) { return '—'; } };
  const bandColor = parseFloat(overall) >= 7 ? 'var(--green)' : parseFloat(overall) >= 5.5 ? 'var(--gold)' : 'var(--red)';
  const bandClass = parseFloat(overall) >= 7 ? 'band-7' : parseFloat(overall) >= 5.5 ? 'band-6' : 'band-5';

  return `<div style="background:#fff;border:1.5px solid var(--border);border-radius:var(--r);overflow:hidden;margin-bottom:20px">
    <!-- Card header -->
    <div style="background:var(--ink);padding:22px 24px;display:grid;grid-template-columns:1fr auto;gap:20px;align-items:center">
      <div>
        <div style="font-size:.65rem;letter-spacing:.12em;text-transform:uppercase;color:rgba(255,255,255,.4);margin-bottom:4px">Student</div>
        <div style="font-family:'DM Serif Display',serif;font-size:1.5rem;color:#fff;margin-bottom:10px">${esc(entry.name||'Student')}</div>
        <div style="display:flex;gap:16px;flex-wrap:wrap">
          <span style="font-size:.75rem;color:rgba(255,255,255,.5)">📝 <strong style="color:rgba(255,255,255,.85)">${esc(mode)}</strong></span>
          ${entry.startedAt ? `<span style="font-size:.75rem;color:rgba(255,255,255,.5)">▶ Start: <strong style="color:rgba(255,255,255,.85)">${fmtDate(entry.startedAt)}</strong></span>` : ''}
          ${entry.submittedAt ? `<span style="font-size:.75rem;color:rgba(255,255,255,.5)">✅ Submit: <strong style="color:rgba(255,255,255,.85)">${fmtDate(entry.submittedAt)}</strong></span>` : (!entry.startedAt ? `<span style="font-size:.75rem;color:rgba(255,255,255,.5)">🕐 <strong style="color:rgba(255,255,255,.85)">${fmtDate(entry.timestamp||entry.Timestamp)}</strong></span>` : '')}
          ${(entry.startedAt && entry.submittedAt) ? `<span style="font-size:.75rem;color:rgba(255,255,255,.5)">⏱ <strong style="color:rgba(255,255,255,.85)">${fmtDuration(entry.startedAt, entry.submittedAt)}</strong></span>` : ''}
          ${entry.code ? `<span style="font-size:.75rem;color:rgba(255,255,255,.5)">🔑 <strong style="color:rgba(255,255,255,.85)">${esc(entry.code)}</strong></span>` : ''}
          ${entry.class ? `<span style="font-size:.75rem;color:rgba(255,255,255,.5)">🎓 <strong style="color:rgba(255,255,255,.85)">${esc(entry.class)}</strong></span>` : ''}
        </div>
        ${entry.question ? `<div style="margin-top:10px;font-size:.8rem;color:rgba(255,255,255,.5);font-style:italic;line-height:1.55;max-width:600px">${esc(entry.question.substring(0,200))}${entry.question.length>200?'…':''}</div>` : ''}
      </div>
      <div style="text-align:center;background:rgba(255,255,255,.06);border:1.5px solid rgba(255,255,255,.12);border-radius:10px;padding:16px 24px">
        <div style="font-family:'DM Serif Display',serif;font-size:3rem;line-height:1;color:${bandColor};margin-bottom:2px">${overall}</div>
        <div style="font-size:.6rem;letter-spacing:.15em;text-transform:uppercase;color:rgba(255,255,255,.35)">Overall Band</div>
      </div>
    </div>
    <!-- Scores -->
    <div style="display:grid;grid-template-columns:repeat(4,1fr);gap:0;border-bottom:1.5px solid var(--border)">
      ${[['Task Response','TR'],['Coherence','CC'],['Lexical','LR'],['Grammar','GRA']].map(([label,key],i) => {
        const val = scores[key] || '—';
        const pct = parseFloat(val) > 0 ? (parseFloat(val)/9*100) + '%' : '0%';
        const clr = parseFloat(val) >= 7 ? 'var(--green)' : parseFloat(val) >= 5.5 ? 'var(--gold)' : 'var(--red)';
        return `<div style="padding:14px 16px;${i<3?'border-right:1.5px solid var(--border)':''}">
          <div style="font-size:.6rem;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--grey);margin-bottom:6px">${label}</div>
          <div style="font-family:'DM Serif Display',serif;font-size:1.8rem;color:${clr};margin-bottom:5px">${val}</div>
          <div style="height:3px;background:var(--border);border-radius:2px;overflow:hidden"><div style="height:100%;background:${clr};width:${pct};border-radius:2px"></div></div>
        </div>`;
      }).join('')}
    </div>
    <!-- Actions -->
    <div style="padding:16px 24px;display:flex;gap:10px;flex-wrap:wrap">
      ${showViewBtn ? `<button class="btn btn-red" onclick="viewFullReport(null)">📄 View Full Report</button>` : ''}
      <button class="btn btn-outline" onclick="window.print()">🖨 Print / Save PDF</button>
    </div>
  </div>`;
}

// ── View full report ──
function viewFullReport(rowData) {
  const entry = rowData || JSON.parse(localStorage.getItem('arw_last_result') || 'null');
  if (!entry) return;
  S.currentRow = entry;
  document.getElementById('list-view').style.display = 'none';
  document.getElementById('report-view').style.display = 'block';
  document.getElementById('btn-print').style.display = '';
  renderFullReport(entry);
}

function viewHistoryRow(idx) {
  const row = S.rows[idx];
  if (!row) return;
  // Convert sheet row format to entry format
  let result = {};
  try { result = JSON.parse(row.FeedbackJSON || row.feedbackJson || '{}'); } catch(e) {}
  const entry = {
    name:      row.StudentName || row.studentName || S.name,
    code:      row.AccessCode  || row.accessCode  || S.code,
    mode:      row.Mode        || row.mode        || '—',
    question:  row.Question    || row.question    || '',
    writing:   row.Essay       || row.essay       || '',
    timestamp: row.Timestamp   || row.timestamp,
    overall:   row.OverallBand || row.overall     || '',
    scores:    { TR: row.TaskResponse||'', CC: row.Coherence||'', LR: row.Lexical||'', GRA: row.Grammar||'' },
    result:    result
  };
  viewFullReport(entry);
}

function showListView() {
  document.getElementById('list-view').style.display = '';
  document.getElementById('report-view').style.display = 'none';
  document.getElementById('btn-print').style.display = 'none';
}

// ── Render full report ──
function renderFullReport(entry) {
  const r       = entry.result || {};
  const scores  = r.scores  || entry.scores  || {};
  const overall = r.overall || entry.overall || '—';
  const mode    = entry.mode || '—';
  const fmtDate = s => { try { const d=new Date(s); if(isNaN(d)) return s||'—'; return d.toLocaleString('vi-VN',{hour12:false}); } catch(e) { return s||'—'; } };
  const fmtDuration = (start, end) => { try { const m = Math.round((new Date(end)-new Date(start))/60000); if(isNaN(m)||m<0) return '—'; const h=Math.floor(m/60),mm=m%60; return h>0?`${h}h${String(mm).padStart(2,'0')}m`:`${mm} min`; } catch(e) { return '—'; } };
  const bandClr = parseFloat(overall)>=7?'var(--green)':parseFloat(overall)>=5.5?'var(--gold)':'var(--red)';

  function scoreBar(v) {
    const pct = parseFloat(v)>0?(parseFloat(v)/9*100)+'%':'0%';
    const clr = parseFloat(v)>=7?'var(--green)':parseFloat(v)>=5.5?'var(--gold)':'var(--red)';
    return `<div class="score-bar"><div class="score-fill" style="width:${pct};background:${clr}"></div></div>`;
  }

  // Corrected text renderer
  function renderCorrected(txt) {
    if (!txt) return '';
    const paragraphs = txt.split(/\n{2,}/);
    return paragraphs.map(para => {
      const lines = para.split(/\n/).map(ln =>
        ln.replace(/~~([^~]+)~~([^~]*)~~/g, (_, wrong, fix) =>
          fix && fix.trim()
            ? `<span class="err-orig">${esc(wrong)}</span>&nbsp;<span class="err-fix">${esc(fix.trim())}</span>`
            : esc(wrong)
        ).replace(/~~([^~]*)~~/g, (_, w) => esc(w))
      );
      return `<p>${lines.join('<br>')}</p>`;
    }).join('');
  }

  // TR Comments
  const trHTML = (r.tr_comments||[]).map((c,i) => `
    <div class="tr-card">
      <div class="tr-num">Comment ${i+1}</div>
      <div class="tr-row"><strong>Original Idea:</strong> "${esc(c.original_idea||'')}"</div>
      ${c.assessment_vi ? `<div class="tr-row"><strong>Assessment:</strong> ${esc(c.assessment_vi)}</div>` : ''}
      ${c.suggestion_en ? `<div class="tr-suggestion">💡 <em>${esc(c.suggestion_en)}</em></div>` : ''}
    </div>`).join('');

  // GRA Errors
  const graHTML = (r.gra_errors||[]).map((e,i) => `
    <div class="gra-card">
      <div class="gra-badge">ERROR ${i+1}</div>
      <div class="gra-diff">
        <span class="gra-wrong">${esc(e.wrong||'')}</span>
        <span class="gra-arrow">→</span>
        <span class="gra-correct">${esc(e.correct||'')}</span>
      </div>
      ${e.explanation_vi ? `<div class="gra-expl">${esc(e.explanation_vi)}</div>` : ''}
    </div>`).join('');

  // LR Issues
  const lrHTML = (r.lr_issues||[]).map(iss => `
    <div class="lr-card">
      <div class="lr-pair">"${esc(iss.original||'')} → ${esc(iss.better||'')}"</div>
      ${iss.explanation_vi ? `<div class="lr-expl">${esc(iss.explanation_vi)}</div>` : ''}
      ${(iss.alternatives||[]).length ? `<div class="lr-alts"><strong>Alternatives:</strong> ${iss.alternatives.map(a=>esc(a)).join(' · ')}</div>` : ''}
    </div>`).join('');

  // CC Feedback
  const cc = r.cc_feedback || null;
  const ccHTML = cc ? `
    ${cc.assessment_vi ? `<div class="cc-assess">${esc(cc.assessment_vi)}</div>` : ''}
    ${(cc.issues||[]).length ? `<div class="cc-sub">❌ Issues:</div><ul class="cc-list">${cc.issues.map(i=>`<li>${esc(i)}</li>`).join('')}</ul>` : ''}
    ${(cc.suggestions||[]).length ? `<div class="cc-sub">💡 Suggestions:</div><ul class="cc-list">${cc.suggestions.map(s=>`<li>${esc(s)}</li>`).join('')}</ul>` : ''}
  ` : (r.feedback?.CC ? `<div style="font-size:.88rem;line-height:1.75">${esc(r.feedback.CC)}</div>` : '');

  const corrected = r.corrected_text || '';

  document.getElementById('report-view').innerHTML = `
    <!-- Sticky report bar -->
    <div class="report-topbar">
      <div class="report-title-bar">📄 Full Report — ${esc(entry.name||'Student')} — ${esc(mode)}</div>
      <div class="report-actions">
        <button class="btn btn-ghost" onclick="showListView()">← Back</button>
        <button class="btn btn-red" onclick="window.print()">🖨 Print / Save PDF</button>
      </div>
    </div>

    <div class="report-body">
      <!-- Header -->
      <div class="report-header-card">
        <div>
          <div class="report-student">Student Report</div>
          <div class="report-name">${esc(entry.name||'Student')}</div>
          <div class="report-meta">
            <span class="report-meta-item">📝 Mode: <strong>${esc(mode)}</strong></span>
            ${entry.startedAt ? `<span class="report-meta-item">▶ Start: <strong>${fmtDate(entry.startedAt)}</strong></span>` : `<span class="report-meta-item">🕐 <strong>${fmtDate(entry.timestamp||entry.Timestamp)}</strong></span>`}
            ${entry.submittedAt ? `<span class="report-meta-item">✅ Submit: <strong>${fmtDate(entry.submittedAt)}</strong></span>` : ''}
            ${(entry.startedAt && entry.submittedAt) ? `<span class="report-meta-item">⏱ Duration: <strong>${fmtDuration(entry.startedAt, entry.submittedAt)}</strong></span>` : ''}
            ${entry.class ? `<span class="report-meta-item">🎓 Class: <strong>${esc(entry.class)}</strong></span>` : ''}
            ${entry.code ? `<span class="report-meta-item">🔑 Code: <strong>${esc(entry.code)}</strong></span>` : ''}
          </div>
        </div>
        <div class="band-display">
          <div class="band-num" style="color:${bandClr}">${overall}</div>
          <div class="band-lbl">Overall Band</div>
        </div>
      </div>

      <!-- Scores -->
      <div class="scores-grid">
        ${[['Task Response','TR'],['Coherence & Cohesion','CC'],['Lexical Resource','LR'],['Grammatical Range','GRA']].map(([label,key]) => `
          <div class="score-card">
            <div class="score-label">${label}</div>
            <div class="score-value" style="color:${parseFloat(scores[key]||0)>=7?'var(--green)':parseFloat(scores[key]||0)>=5.5?'var(--gold)':'var(--red)'}">${scores[key]||'—'}</div>
            ${scoreBar(scores[key]||0)}
          </div>`).join('')}
      </div>

      ${r.overall_feedback_vi ? `
      <div class="section" style="margin-bottom:20px">
        <div class="section-head"><span class="section-head-icon">💬</span><span class="section-head-title">Overall Assessment</span></div>
        <div class="section-body"><div class="overall-vi">${esc(r.overall_feedback_vi)}</div></div>
      </div>` : ''}

      ${entry.question ? `
      <div class="section">
        <div class="section-head"><span class="section-head-icon">❓</span><span class="section-head-title">Task Question</span></div>
        <div class="section-body"><div style="font-size:.9rem;line-height:1.75;font-style:italic;color:var(--grey)">${esc(entry.question)}</div></div>
      </div>` : ''}

      ${entry.writing ? `
      <div class="section">
        <div class="section-head"><span class="section-head-icon">✍️</span><span class="section-head-title">Student's Writing</span></div>
        <div class="section-body"><div class="essay-text">${esc(entry.writing)}</div></div>
      </div>` : ''}

      ${corrected ? `
      <div class="section">
        <div class="section-head"><span class="section-head-icon">✅</span><span class="section-head-title">Corrected Version</span></div>
        <div class="corr-legend">
          <span><span class="err-orig">wrong</span> — Original error</span>
          <span><span class="err-fix">correct</span> — Correction</span>
        </div>
        <div class="section-body"><div class="corrected-text">${renderCorrected(corrected)}</div></div>
      </div>` : ''}

      ${trHTML ? `
      <div class="section">
        <div class="section-head"><span class="section-head-icon">✅</span><span class="section-head-title">Task Response & Content (${(r.tr_comments||[]).length})</span></div>
        <div class="section-body">${trHTML}</div>
      </div>` : ''}

      ${graHTML ? `
      <div class="section">
        <div class="section-head"><span class="section-head-icon">⚠️</span><span class="section-head-title">Grammar Errors (${(r.gra_errors||[]).length})</span></div>
        <div class="section-body">${graHTML}</div>
      </div>` : ''}

      ${lrHTML ? `
      <div class="section">
        <div class="section-head"><span class="section-head-icon">📚</span><span class="section-head-title">Vocabulary Improvements (${(r.lr_issues||[]).length})</span></div>
        <div class="section-body">${lrHTML}</div>
      </div>` : ''}

      ${ccHTML ? `
      <div class="section">
        <div class="section-head"><span class="section-head-icon">🔗</span><span class="section-head-title">Coherence & Cohesion</span></div>
        <div class="section-body">${ccHTML}</div>
      </div>` : ''}

      <div style="text-align:center;padding:32px 0;color:var(--grey);font-size:.78rem">
        Developed by Duong Thanh Tu — DNU English Faculty
      </div>
    </div>`;
}

// ── Helpers ──
function esc(s) {
  return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function gasGet(action, payload) {
  return new Promise((resolve, reject) => {
    const cb = 'wd_cb_' + Date.now() + '_' + Math.floor(Math.random()*99999);
    const params = 'callback=' + encodeURIComponent(cb)
      + '&action=' + encodeURIComponent(action)
      + '&payload=' + encodeURIComponent(JSON.stringify(payload||{}))
      + '&sessionToken=' + encodeURIComponent((payload||{}).sessionToken||'');
    const s = document.createElement('script');
    s.src = HUB_GAS + '?' + params;
    const t = setTimeout(() => { cleanup(); reject(new Error('Timeout')); }, 15000);
    window[cb] = r => { cleanup(); resolve(r); };
    const cleanup = () => { clearTimeout(t); delete window[cb]; s.parentNode && s.parentNode.removeChild(s); };
    s.onerror = () => { cleanup(); reject(new Error('Network error')); };
    document.head.appendChild(s);
  });
}

// If opened directly after submitting, auto-show report
window.addEventListener('DOMContentLoaded', () => {
  const raw = localStorage.getItem('arw_last_result');
  if (raw && !sessionStorage.getItem('arw_detail_shown_list')) {
    // Default: show list view with latest loaded
    // User can click "View Full Report" to go to detail
  }
});
</script>
